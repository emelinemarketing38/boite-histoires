<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Boîte à histoires</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Histoires">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="theme-color" content="#f39c12">
<style>
:root {
  --primary: #f39c12;
  --bg: #fef9ef;
  --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
  --radius: 20px;
  --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --universe-color: #f39c12;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: #333;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

body { position: relative; }

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  opacity: 0;
  transform: translateX(60px);
  pointer-events: none;
  transition: opacity var(--transition), transform var(--transition);
}

.screen.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.screen.exit-left {
  opacity: 0;
  transform: translateX(-60px);
  pointer-events: none;
}

/* ---- PROGRESS BAR ---- */
.progress-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  width: 100%;
  max-width: 400px;
}

.progress-dot {
  flex: 1;
  height: 8px;
  border-radius: 4px;
  background: #e0d6c8;
  transition: background 0.3s;
}

.progress-dot.done { background: var(--universe-color, var(--primary)); }
.progress-dot.current {
  background: var(--universe-color, var(--primary));
  animation: pulse-dot 1.2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ---- WELCOME ---- */
#welcome {
  justify-content: center;
  text-align: center;
  background: linear-gradient(160deg, #fef9ef 0%, #fdebd0 100%);
}

#welcome .logo { font-size: 80px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

#welcome h1 {
  font-size: 32px;
  color: #e67e22;
  margin-bottom: 6px;
}

#welcome .subtitle {
  font-size: 18px;
  color: #999;
  margin-bottom: 40px;
}

.btn-start {
  display: inline-block;
  padding: 18px 48px;
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #f39c12, #e67e22);
  border: none;
  border-radius: 50px;
  box-shadow: 0 6px 20px rgba(243,156,18,0.4);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-start:active { transform: scale(0.95); box-shadow: 0 3px 10px rgba(243,156,18,0.3); }

/* ---- STEP SCREENS (universe, character, location, object) ---- */
.step-screen { padding-top: 24px; }

.step-screen h2 {
  font-size: 24px;
  text-align: center;
  margin-bottom: 20px;
  color: var(--universe-color, #333);
}

.choices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
  max-width: 400px;
}

.choice-card {
  background: #fff;
  border-radius: var(--radius);
  padding: 20px 12px;
  text-align: center;
  box-shadow: var(--card-shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  border: 3px solid transparent;
}

.choice-card:active { transform: scale(0.95); }

.choice-card .emoji { font-size: 48px; display: block; margin-bottom: 8px; }
.choice-card .label { font-size: 16px; font-weight: 600; line-height: 1.3; }

.choice-card.selected {
  border-color: var(--universe-color, var(--primary));
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transform: scale(1.03);
}

/* Universe cards: 3x2 on wider, 2x3 on narrow */
.choices-grid.universe-grid {
  grid-template-columns: 1fr 1fr;
}

/* Back button */
.btn-back {
  position: absolute;
  top: 26px;
  left: 16px;
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  z-index: 10;
  color: #999;
}

/* ---- STORY SCREEN ---- */
#story-screen {
  padding: 0;
  background: #fff;
}

.story-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--universe-color);
  color: #fff;
}

.story-header .title { font-size: 18px; font-weight: 700; }

.btn-restart {
  background: rgba(255,255,255,0.25);
  border: none;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
}

.btn-restart:active { background: rgba(255,255,255,0.4); }

.story-viewport {
  flex: 1;
  width: 100%;
  position: relative;
  overflow: hidden;
}

.story-pages-container {
  display: flex;
  height: 100%;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.story-page {
  min-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px;
  text-align: center;
}

.story-page .page-illustration {
  width: 100%;
  max-width: 320px;
  margin-bottom: 16px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.story-page .page-illustration svg {
  width: 100%;
  height: auto;
  display: block;
}
.story-page .page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--universe-color);
  margin-bottom: 14px;
}

.story-page .page-text {
  font-size: 19px;
  line-height: 1.6;
  color: #444;
  max-width: 380px;
}

.story-nav {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 24px;
  background: #fff;
}

.story-nav button {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  font-size: 24px;
  cursor: pointer;
  background: var(--universe-color);
  color: #fff;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  transition: opacity 0.2s, transform 0.2s;
}

.story-nav button:active { transform: scale(0.9); }
.story-nav button:disabled { opacity: 0.3; cursor: default; }

.page-dots {
  display: flex;
  gap: 8px;
}

.page-dots span {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ddd;
  transition: background 0.3s, transform 0.3s;
}

.page-dots span.active {
  background: var(--universe-color);
  transform: scale(1.3);
}

/* ---- ANIMATIONS ---- */
@keyframes card-in {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.choice-card { animation: card-in 0.35s ease both; }
.choice-card:nth-child(1) { animation-delay: 0.05s; }
.choice-card:nth-child(2) { animation-delay: 0.1s; }
.choice-card:nth-child(3) { animation-delay: 0.15s; }
.choice-card:nth-child(4) { animation-delay: 0.2s; }
.choice-card:nth-child(5) { animation-delay: 0.25s; }
.choice-card:nth-child(6) { animation-delay: 0.3s; }

/* Responsive tweaks */
@media (max-height: 650px) {
  .story-page { padding: 16px 18px; }
  .story-page .page-illustration { max-width: 260px; margin-bottom: 10px; }
  .story-page .page-title { font-size: 18px; margin-bottom: 10px; }
  .story-page .page-text { font-size: 16px; }
}

@media (min-width: 500px) {
  .choices-grid { max-width: 460px; }
  .story-page .page-text { max-width: 440px; }
}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo">📖</div>
  <h1>Boite a histoires</h1>
  <p class="subtitle">Choisis ton aventure !</p>
  <button class="btn-start" onclick="goTo('universe')">C'est parti !</button>
</div>

<!-- UNIVERSE -->
<div id="universe" class="screen step-screen">
  <div class="progress-bar" id="prog-universe"></div>
  <h2>Choisis ton univers</h2>
  <div class="choices-grid universe-grid" id="universe-grid"></div>
</div>

<!-- CHARACTER -->
<div id="character" class="screen step-screen">
  <button class="btn-back" onclick="goBack('universe')">&larr;</button>
  <div class="progress-bar" id="prog-character"></div>
  <h2>Choisis ton personnage</h2>
  <div class="choices-grid" id="character-grid"></div>
</div>

<!-- LOCATION -->
<div id="location" class="screen step-screen">
  <button class="btn-back" onclick="goBack('character')">&larr;</button>
  <div class="progress-bar" id="prog-location"></div>
  <h2>Choisis ton lieu</h2>
  <div class="choices-grid" id="location-grid"></div>
</div>

<!-- OBJECT -->
<div id="object" class="screen step-screen">
  <button class="btn-back" onclick="goBack('location')">&larr;</button>
  <div class="progress-bar" id="prog-object"></div>
  <h2>Choisis ton objet</h2>
  <div class="choices-grid" id="object-grid"></div>
</div>

<!-- STORY -->
<div id="story-screen" class="screen">
  <div class="story-header">
    <span class="title" id="story-title"></span>
    <button class="btn-restart" onclick="restart()">Recommencer</button>
  </div>
  <div class="story-viewport" id="story-viewport">
    <div class="story-pages-container" id="story-pages"></div>
  </div>
  <div class="story-nav">
    <button id="prev-btn" onclick="storyNav(-1)">&larr;</button>
    <div class="page-dots" id="page-dots"></div>
    <button id="next-btn" onclick="storyNav(1)">&rarr;</button>
  </div>
</div>

<script>
/* ====================================================================
   DATA
   ==================================================================== */
const DATA = {
  pirates: {
    id: 'pirates', name: 'Pirates', emoji: '\u{1F3F4}\u200D\u2620\uFE0F', color: '#2980b9',
    personnages: [

    ],
    lieux: [

      { name: 'La grotte secr\u00e8te', emoji: '\uD83D\uDD73\uFE0F' },

    ],
    objets: [
      { name: 'La carte au tr\u00e9sor', emoji: '\uD83D\uDDFA\uFE0F' },
      { name: 'Le coffre magique', emoji: '\uD83D\uDCE6' },
      { name: 'La longue-vue enchant\u00e9e', emoji: '\uD83D\uDD2D' },
      { name: 'Le drapeau pirate', emoji: '\u{1F3F4}\u200D\u2620\uFE0F' }
    ],
    stories: [
      // Template 0 — Le monstre marin qui avait peur
      [
        { title: "L'appel de la mer", emoji: '\u26F5', text: "Le soleil se l\u00e8ve sur l'oc\u00e9an et peint les vagues en orange. {personnage} se tient sur le pont du bateau, le nez au vent. L'air sent bon le sel et les algues. Les mouettes crient au-dessus des voiles. Aujourd'hui, direction {lieu} ! On dit qu'un terrible monstre marin y garde un tr\u00e9sor fabuleux. {personnage} serre {objet} dans ses mains. Le vent du nord souffle fort. C'est le vent qui vient des pays froids, du haut de la boussole." },
        { title: 'La temp\u00eate surprise', emoji: '\uD83C\uDF0A', text: "CRAAC ! Le ciel devient tout noir d'un coup. Les vagues grossissent et secouent le bateau dans tous les sens. Plouf, splash, BOOM ! L'eau passe par-dessus le pont. {personnage} s'accroche au m\u00e2t de toutes ses forces. Les \u00e9clairs dessinent des zigzags dans le ciel. Le tonnerre gronde comme un gros tambour. \"B\u00e2bord ! Tribord !\" crie {personnage}. B\u00e2bord, c'est \u00e0 gauche du bateau, et tribord, c'est \u00e0 droite. Il faut manoeuvrer vite !" },
        { title: 'Le calme apr\u00e8s la temp\u00eate', emoji: '\uD83C\uDF05', text: "Aussi vite qu'elle est arriv\u00e9e, la temp\u00eate s'en va. La mer redevient calme et lisse comme un miroir. Ouf ! Le bateau tangue encore un peu, mais {personnage} est sain et sauf. Et voil\u00e0 {lieu} qui appara\u00eet juste devant ! Mais quelque chose est bizarre : l'eau autour est couverte de grosses bulles qui font bloup, bloup, bloup. {objet} se met \u00e0 vibrer. Quelque chose de TR\u00c8S gros se cache sous la surface." },
        { title: 'Le monstre appara\u00eet', emoji: '\uD83D\uDC19', text: "SPLAAAASH ! Une \u00e9norme tentacule sort de l'eau ! Puis une autre, et encore une autre ! Un gigantesque poulpe se dresse devant le bateau. Il a des yeux grands comme des roues de charrette et des ventouses grosses comme des assiettes. \"GROOOOAR !\" rugit le monstre. Les vagues \u00e9claboussent tout. {personnage} tombe \u00e0 la renverse. Le poulpe est terrrrrrrifiant ! Il a huit bras comme tous les poulpes. Mais attendez... Pourquoi est-ce qu'il tremble ?" },
        { title: 'Le monstre tremble', emoji: '\uD83D\uDE32', text: "Incroyable ! Le gigantesque poulpe... pleure ! De grosses larmes bleues coulent de ses yeux \u00e9normes et tombent dans la mer. Sploc, sploc, sploc. \"Je... je ne suis pas m\u00e9chant !\" sanglote le poulpe d'une voix toute tremblante. \"C'est les poissons qui m'ont dit de faire peur aux bateaux, sinon ils ne joueraient plus avec moi !\" {personnage} n'en revient pas. Ce monstre terrible n'est qu'un gros poulpe timide que les poissons font marcher !" },
        { title: 'Le plan des poissons', emoji: '\uD83D\uDC1F', text: "{personnage} s'assoit au bord du bateau, tout pr\u00e8s du poulpe. \"Raconte-moi tout, gros poulpe.\" Le poulpe s'appelle Octave. Il explique que les poissons-clowns, ceux avec des rayures orange et blanches, lui ont dit de faire fuir les bateaux pour garder {lieu} pour eux. \"Si tu refuses, on ne sera plus tes amis !\" disaient-ils. Octave avait tellement peur d'\u00eatre seul qu'il ob\u00e9issait. {objet} brille d'une lumi\u00e8re douce et chaude." },
        { title: 'La visite sous-marine', emoji: '\uD83E\uDD3F', text: "Octave propose \u00e0 {personnage} de descendre sous l'eau pour voir la v\u00e9rit\u00e9. Le poulpe fait une bulle d'air magique autour de {personnage}. Plouf ! Sous la mer, c'est magnifique ! Des coraux rouges, roses et jaunes poussent partout. Des hippocampes se balancent dans le courant. Et au fond, {personnage} voit les poissons-clowns assis sur un \u00e9nooorme tas de tr\u00e9sors vol\u00e9s \u00e0 tous les bateaux qu'Octave a fait fuir. Voil\u00e0 la v\u00e9rit\u00e9 !" },
        { title: 'Le coup de th\u00e9\u00e2tre', emoji: '\u2728', text: "\"STOP !\" crie {personnage} aux poissons-clowns. Ils sursautent et essaient de se cacher derri\u00e8re les tr\u00e9sors. \"Octave n'est pas votre esclave ! Et ces tr\u00e9sors ne sont pas \u00e0 vous !\" Les poissons-clowns baissent la t\u00eate. Mais la VRAIE surprise, c'est que sous la pile de tr\u00e9sors, il y a un b\u00e9b\u00e9 tortue de mer coinc\u00e9e ! Elle ne peut plus bouger. \"Au secours !\" couine la petite tortue. {objet} brille intens\u00e9ment." },
        { title: 'Tout le monde aide', emoji: '\uD83D\uDC22', text: "Octave utilise ses huit bras pour soulever les tr\u00e9sors un par un. Les poissons-clowns, tout penauds, aident \u00e0 pousser les pi\u00e8ces. {personnage} guide la petite tortue vers la lumi\u00e8re. \"Doucement, doucement.\" La tortue est libre ! Elle bat des nageoires de joie. Les poissons-clowns pleurent : \"Pardon, Octave. On \u00e9tait jaloux parce que tu es grand et fort, et nous on est tout petits.\" Octave les prend d\u00e9licatement dans une tentacule et les serre." },

      // Template 1 — La carte qui menait au mauvais endroit
      [
        { title: 'La carte myst\u00e9rieuse', emoji: '\uD83D\uDDFA\uFE0F', text: "{personnage} trouve un message dans une bouteille \u00e9chou\u00e9e sur la plage. \u00c0 l'int\u00e9rieur, il y a une carte avec un grand X rouge. \"Le tr\u00e9sor le plus pr\u00e9cieux du monde est \u00e0 {lieu} !\" dit le message. {personnage} saute de joie. La carte montre qu'il faut naviguer vers l'est. L'est, c'est l\u00e0 o\u00f9 le soleil se l\u00e8ve le matin. {personnage} attrape {objet} et court vers le bateau. L'aventure attend !" },
        { title: "Le voyage vers l'est", emoji: '\u26F5', text: "Le bateau file sur la mer bleue. {personnage} garde le cap vers l'est en suivant le soleil du matin. Des dauphins accompagnent le bateau en sautant hors de l'eau. Woush, woush ! Ils font des sauts p\u00e9rilleux magnifiques. Les dauphins sont des mammif\u00e8res, comme nous. Ils respirent de l'air et allaitent leurs petits. Un dauphin crache un jet d'eau sur {personnage}. Pffft ! \"H\u00e9 !\" rit {personnage}, tout mouill\u00e9." },
        { title: "L'\u00eele de la carte", emoji: '\uD83C\uDFDD\uFE0F', text: "Voil\u00e0 {lieu} ! {personnage} suit la carte : dix pas vers le nord, tourner \u00e0 gauche, cinq pas encore. Le X devrait \u00eatre juste... ici ! {personnage} creuse, creuse, creuse. Mais il ne trouve rien du tout ! Juste du sable, des cailloux et un ver de terre surpris. \"Hein ?\" {personnage} retourne la carte dans tous les sens. C'est s\u00fbrement une erreur. Ou bien... quelqu'un a fait une fausse carte expr\u00e8s !" },
        { title: "La vieille dame de l'\u00eele", emoji: '\uD83D\uDC75', text: "\"Tu ne trouveras rien ici, petit pirate.\" {personnage} sursaute ! Une toute petite vieille dame est assise sur un rocher. Elle a un chapeau plein de coquillages et un sourire malicieux. \"C'est moi qui ai \u00e9crit cette fausse carte.\" {personnage} est en col\u00e8re ! \"Pourquoi ?\" \"Parce que le vrai tr\u00e9sor n'est jamais l\u00e0 o\u00f9 on croit. Suis-moi, je vais te montrer un secret.\" La vieille dame se l\u00e8ve et marche vers une falaise." },
        { title: 'Le passage secret', emoji: '\uD83D\uDD73\uFE0F', text: "La vieille dame pousse un rocher couvert d'\u00e9toiles de mer. Les \u00e9toiles de mer n'ont pas de cerveau mais elles ont des yeux au bout de chaque bras ! Derri\u00e8re le rocher, un passage secret m\u00e8ne sous la terre. Il y fait noir. {objet} se met \u00e0 briller et \u00e9claire le chemin. Les parois sont couvertes de coquillages qui scintillent comme des bijoux. L'air sent le sel et le myst\u00e8re. Drip, drip, font les gouttes qui tombent du plafond." },

        { title: 'Le grand projet', emoji: '\uD83C\uDF73', text: "Aujourd'hui, {personnage} a d\u00e9cid\u00e9 de pr\u00e9parer la plus d\u00e9licieuse surprise du monde \u00e0 {lieu} ! Ce sera un g\u00e2teau absolument extraordinaire. {personnage} a trouv\u00e9 une vieille recette secr\u00e8te dans un tiroir : \"Le g\u00e2teau du bonheur. Ingr\u00e9dients : de la farine, du sucre, des oeufs, du beurre, et surtout... un ingr\u00e9dient myst\u00e8re.\" L'ingr\u00e9dient myst\u00e8re est griffonn\u00e9 et on ne peut pas le lire ! {objet} est pr\u00eat. L'aventure commence !" },
        { title: 'Les courses', emoji: '\uD83D\uDED2', text: "{personnage} part acheter les ingr\u00e9dients. \u00c0 la boulangerie, le boulanger donne un sac de farine. Elle est toute blanche et douce comme de la neige. \u00c0 l'\u00e9picerie, les oeufs dorment dans leur bo\u00eete. Il y en a six, bien rang\u00e9s. {personnage} les porte comme un tr\u00e9sor. Le beurre est froid et glissant. Le sucre brille comme des petits cristaux. Mais l'ingr\u00e9dient myst\u00e8re ? Personne ne sait ce que c'est. {objet} vibre d'impatience." },
        { title: 'Les d\u00e9g\u00e2ts en cuisine', emoji: '\uD83D\uDCA5', text: "De retour \u00e0 {lieu}, {personnage} met tout sur la table et commence. CRAC ! Premier oeuf... \u00e0 c\u00f4t\u00e9 du bol. Le jaune coule sur la table. \"Oh non !\" POUF ! La farine s'envole quand {personnage} ouvre le sac trop vite. Un nuage blanc couvre TOUT. Le chat \u00e9ternue : \"ATCHOUM !\" Il a de la farine sur les moustaches. La cuisine ressemble \u00e0 un champ de bataille. {personnage} a de la farine sur le nez et dans les cheveux." },
        { title: 'La voisine magique', emoji: '\uD83D\uDC75', text: "TOC TOC TOC. C'est Madame Dupont, la voisine. Elle a senti la farine jusque chez elle ! Elle regarde la cuisine et \u00e9clate de rire. \"Oh l\u00e0 l\u00e0 ! Je crois que tu as besoin d'un coup de main.\" {personnage} pensait que la voisine allait gronder. Mais non ! Madame Dupont adore cuisiner. \"Sais-tu que pour casser un oeuf, il faut le taper doucement sur le bord du bol ? Comme \u00e7a. Toc !\" L'oeuf se casse parfaitement. \"Trop facile !\" dit {personnage}." },
        { title: 'La p\u00e2te magique', emoji: '\u2728', text: "Madame Dupont montre tout \u00e0 {personnage}. On met la farine en volcan, les oeufs au milieu, le beurre fondu et le sucre. On m\u00e9lange doucement, en tournant toujours dans le m\u00eame sens. \"Comme une horloge\", dit Madame Dupont. La p\u00e2te devient lisse et dor\u00e9e. Elle sent d\u00e9j\u00e0 bon ! {objet} semble briller de plaisir. \"Mais l'ingr\u00e9dient myst\u00e8re ?\" demande {personnage}. \"On verra apr\u00e8s la cuisson\", dit Madame Dupont avec un clin d'oeil myst\u00e9rieux." },
        { title: "Le four et l'attente", emoji: '\u23F3', text: "Le g\u00e2teau entre dans le four. Il fait 180 degr\u00e9s l\u00e0-dedans, c'est tr\u00e8s chaud ! On ne touche JAMAIS un four, c'est dangereux. Pendant que le g\u00e2teau cuit, {personnage} et Madame Dupont nettoient la cuisine. Frotter, rincer, essuyer. La cuisine redevient propre. Une d\u00e9licieuse odeur commence \u00e0 se r\u00e9pandre. Miam ! Le g\u00e2teau gonfle, gonfle, gonfle derri\u00e8re la vitre du four. Il est dor\u00e9 et magnifique. \"Encore cinq minutes !\" dit Madame Dupont." },
        { title: 'La catastrophe du g\u00e2teau', emoji: '\uD83D\uDE31', text: "DRIIIING ! C'est pr\u00eat ! {personnage} est tellement excit\u00e9 ! Madame Dupont sort le g\u00e2teau du four et le pose sur la table. Il est beau, il est dor\u00e9, il sent merveilleusement bon. Et puis... PFFFFFFT. Le g\u00e2teau se d\u00e9gonfle comme un ballon ! Il devient tout plat, tout ratin\u00e9, tout triste. \"NOOOOON !\" {personnage} a les larmes aux yeux. C'est rat\u00e9. Compl\u00e8tement rat\u00e9. Le plus beau g\u00e2teau du monde est devenu une cr\u00eape toute moche." },
        { title: "L'ingr\u00e9dient myst\u00e8re", emoji: '\uD83D\uDCA1', text: "Madame Dupont regarde {personnage} et sourit. \"Tu sais quoi ? Le g\u00e2teau est rat\u00e9, et c'est pas grave du tout. Car l'ingr\u00e9dient myst\u00e8re de la recette du bonheur, je le connais.\" {personnage} renifle. \"C'est quoi ?\" \"C'est le RIRE. D\u00e9coupe le g\u00e2teau rat\u00e9 et go\u00fbte.\" {personnage} prend un morceau. C'est... D\u00c9LICIEUX ! Plat et moche, mais d\u00e9licieux ! {personnage} \u00e9clate de rire en voyant la t\u00eate du g\u00e2teau aplati. Madame Dupont rit aussi." },
        { title: 'Le partage', emoji: '\uD83C\uDF70', text: "Ils coupent le g\u00e2teau plat en petits morceaux et le partagent avec les voisins. Tout le monde glousse en voyant la forme du g\u00e2teau. \"On dirait une galette !\" \"Non, un frisbee !\" \"C'est le g\u00e2teau le plus dr\u00f4le du monde !\" \u00c0 {lieu}, les rires r\u00e9sonnent. {objet} tr\u00f4ne au milieu de la table. Chaque personne qui go\u00fbte dit la m\u00eame chose : \"C'est d\u00e9licieux !\" Et c'est vrai. L'amour qu'on met dans la cuisine, \u00e7a se sent dans chaque bouch\u00e9e." },
        { title: 'La recette du bonheur', emoji: '\uD83C\uDF1F', text: "Ce soir, {personnage} recopie la recette dans un nouveau carnet. Mais cette fois, l'ingr\u00e9dient myst\u00e8re est \u00e9crit bien lisiblement : \"RIRE. En mettre beaucoup.\" Et en dessous, {personnage} ajoute : \"Si le g\u00e2teau rate, c'est encore mieux. Parce qu'un g\u00e2teau rat\u00e9 partag\u00e9 avec des amis est mille fois meilleur qu'un g\u00e2teau parfait mang\u00e9 tout seul.\" {objet} est pos\u00e9 sur la table de nuit. Demain, {personnage} refera un g\u00e2teau. Et cette fois... il ratera peut-\u00eatre encore. Et ce sera encore g\u00e9nial. Bonne nuit, petit p\u00e2tissier !" }

      // Template 2 — Le parapluie qui faisait danser la pluie
      [
        { title: 'Le ciel tout gris', emoji: '\u26C8\uFE0F', text: "Quel temps horrible ! La pluie tombe sans s'arr\u00eater sur {lieu}. Plic ploc plic ploc. {personnage} regarde par la fen\u00eatre, le nez \u00e9cras\u00e9 contre la vitre. \"On ne peut rien faire quand il pleut\", soupire {personnage}. Les flaques d'eau grossissent dans la cour. Les escargots, eux, ont l'air ravis. Ils glissent lentement sur les feuilles mouill\u00e9es. Un escargot porte sa maison sur son dos, comme un petit camping-car vivant ! {objet} est pos\u00e9 sur la chaise." },
        { title: "L'appel de Mamie", emoji: '\uD83D\uDCDE', text: "DRING ! C'est Mamie au t\u00e9l\u00e9phone. \"Mon petit, j'ai besoin d'aide ! J'ai laiss\u00e9 mon sac \u00e0 {lieu} et il pleut trop pour que j'y aille. Tu peux me le rapporter ?\" {personnage} n'a pas envie de sortir sous la pluie. Mais Mamie a besoin d'aide. Et quand quelqu'un a besoin d'aide, on y va ! {personnage} enfile ses bottes en caoutchouc, prend {objet} et le parapluie rouge, et ouvre la porte. SPLASH ! La pluie lui saute dessus." },
        { title: 'Le parapluie chanteur', emoji: '\uD83C\uDFB5', text: "En marchant sous la pluie, {personnage} remarque quelque chose d'\u00e9trange. Chaque goutte qui tombe sur le parapluie fait une NOTE DE MUSIQUE diff\u00e9rente ! Pling, plong, pling ! C'est comme un petit piano de pluie. {personnage} tourne le parapluie \u00e0 gauche : la musique devient grave. \u00c0 droite : elle devient aigu\u00eb. En le faisant tournoyer : \u00e7a fait une vraie m\u00e9lodie ! \"Waouh !\" Des passants s'arr\u00eatent et \u00e9coutent, \u00e9merveill\u00e9s. La pluie joue de la musique !" },
        { title: 'La danse des flaques', emoji: '\uD83D\uDC83', text: "Un petit gar\u00e7on s'approche et saute dans une flaque. SPLATCH ! La flaque \u00e9clabousse en rythme avec la musique du parapluie. Puis une petite fille saute dans une autre. SPLAATCH ! Bient\u00f4t, il y a six enfants qui sautent dans les flaques en rythme autour de {personnage}. C'est un BALLET de flaques ! Les passants applaudissent. Un chien saute aussi et \u00e9clabousse tout le monde. OUAF SPLATCH ! Tout le monde rit." },
        { title: 'Le monsieur grognon', emoji: '\uD83D\uDE20', text: "\"ARR\u00caTEZ ce vacarme !\" Un homme en costume est furieux. Il est tout mouill\u00e9 et de tr\u00e8s mauvaise humeur. \"La pluie, c'est HORRIBLE. Il n'y a RIEN d'amusant l\u00e0-dedans !\" Les enfants s'arr\u00eatent de danser. Le silence tombe. {personnage} regarde l'homme. Il n'est pas vraiment m\u00e9chant. Il a l'air fatigu\u00e9 et triste. Ses chaussures sont tremp\u00e9es et son journal est tout mouill\u00e9. Quand on est malheureux, parfois on crie sur les autres. {personnage} a une id\u00e9e." },
        { title: 'Le cadeau de la pluie', emoji: '\uD83C\uDF08', text: "{personnage} s'approche du monsieur grognon et lui tend le parapluie. \"Tenez, monsieur. \u00c9coutez.\" L'homme prend le parapluie, surpris. Et l\u00e0... il entend la musique. Pling, plong, pling. Ses yeux s'ouvrent tout grands. \"Mais... c'est magnifique !\" Sa bouche forme un sourire. C'est un tout petit sourire, mais c'est un d\u00e9but ! Il commence \u00e0 taper du pied en rythme. {objet} brille dans le sac de {personnage}." },
        { title: 'Le concert sous la pluie', emoji: '\uD83C\uDFB6', text: "Le monsieur grognon n'est plus grognon du tout ! Il tourbillonne avec le parapluie musical et rit comme un enfant. \"\u00c7a fait vingt ans que je n'avais pas saut\u00e9 dans une flaque !\" crie-t-il. SPLATCH ! Il saute dans la plus grosse flaque de toutes. Son costume est tremp\u00e9 mais il s'en fiche ! Les enfants l'entourent et dansent avec lui. Un vrai concert de pluie \u00e0 {lieu} ! Des gens ouvrent leurs fen\u00eatres pour regarder et applaudir." },
        { title: 'Le sac de Mamie', emoji: '\uD83D\uDC5C', text: "Oh ! {personnage} avait presque oubli\u00e9 ! Le sac de Mamie ! {personnage} court \u00e0 {lieu}, trouve le sac et revient en courant. Mais surprise : Mamie est l\u00e0, sous la pluie, en train de danser avec les autres ! \"Mamie ?! Mais tu avais dit que tu ne pouvais pas sortir !\" Mamie fait un clin d'oeil. \"J'ai entendu la musique depuis ma fen\u00eatre. Impossible de r\u00e9sister !\" Elle danse le twist sous la pluie. {objet} dans le sac semble danser aussi." },
        { title: "L'arc-en-ciel", emoji: '\uD83C\uDF08', text: "Et tout \u00e0 coup, la pluie s'arr\u00eate. Un immense arc-en-ciel appara\u00eet dans le ciel. Sept couleurs magnifiques : rouge, orange, jaune, vert, bleu, indigo et violet. \"OOOOOH !\" font tous les danseurs en m\u00eame temps. Le monsieur en costume, les enfants, Mamie, le chien, tous l\u00e8vent les yeux. L'arc-en-ciel est si grand qu'il couvre tout {lieu}. Le parapluie musical joue une derni\u00e8re note, toute douce. {personnage} serre la main de Mamie." },
        { title: 'Le sourire de la pluie', emoji: '\uD83C\uDF1F', text: "Ce soir, {personnage} est bien au chaud avec {objet}. Le monsieur grognon est pass\u00e9 dire merci. Il a offert un bonbon \u00e0 chaque enfant. \"Vous m'avez rappel\u00e9 quelque chose que j'avais oubli\u00e9\", a-t-il dit. \"La pluie n'est pas triste. C'est nous qui d\u00e9cidons si elle est triste ou joyeuse.\" {personnage} sourit sous la couette. Dehors, il pleut encore un peu. Plic, ploc. Mais maintenant, \u00e7a ressemble \u00e0 une berceuse. Bonne nuit, petit danseur de pluie !" }

      // Template 3 — Le jardin qui poussait \u00e0 l'envers
      [
        { title: 'Les graines myst\u00e8re', emoji: '\uD83C\uDF31', text: "{personnage} trouve un sachet de graines dans un coin de {lieu}. Sur le sachet, un message \u00e9trange : \"Attention ! Ces graines font pousser des choses SURPRENANTES.\" Pas de photo, pas de nom. Juste un petit dessin de point d'interrogation. {personnage} est trop curieux pour r\u00e9sister. Il prend une petite pelle, creuse un trou dans la terre et plante trois graines. Un peu d'eau par-dessus. Et hop, {objet} est pos\u00e9 \u00e0 c\u00f4t\u00e9 pour surveiller." },
        { title: 'La pousse bizarre', emoji: '\uD83C\uDF3F', text: "Le lendemain, {personnage} court voir les graines et reste bouche b\u00e9e. Les plantes ont pouss\u00e9 pendant la nuit... mais \u00c0 L'ENVERS ! Les racines sont en haut, dans l'air, et les feuilles sont dans la terre. C'est compl\u00e8tement fou ! La premi\u00e8re plante a des feuilles bleues. La deuxi\u00e8me a des fleurs qui sentent... le chocolat ?! Et la troisi\u00e8me fait un bruit de clochette quand le vent souffle. Ding ding ! \"C'est de la magie !\" s'\u00e9crie {personnage}." },
        { title: 'Les voisins curieux', emoji: '\uD83D\uDC40', text: "Les voisins viennent voir le jardin \u00e0 l'envers. \"C'est n'importe quoi !\" dit Monsieur Grumeau en croisant les bras. \"Les plantes ne poussent PAS comme \u00e7a.\" \"Il faut les arracher\", dit Madame Pointue. {personnage} a un peu peur. Tout le monde trouve les plantes bizarres. {objet} tombe par terre comme s'il \u00e9tait triste. Mais la petite Lina, trois ans, tire la manche de {personnage} : \"Moi je les trouve belles.\"" },
        { title: 'Le matin des fruits', emoji: '\uD83C\uDF4E', text: "Le troisi\u00e8me jour, les plantes \u00e0 l'envers font des FRUITS ! Mais pas des fruits normaux. La plante bleue donne des pommes en forme d'\u00e9toiles. La plante chocolat donne des oranges qui ont le go\u00fbt de bonbons. Et la plante \u00e0 clochettes donne des cerises qui BRILLENT dans le noir. {personnage} en mange une. C'est absolument D\u00c9LICIEUX. Le go\u00fbt le plus incroyable du monde. {objet} se met \u00e0 briller aussi, comme les cerises." },
        { title: 'Le secret des graines', emoji: '\uD83D\uDD2E', text: "Un vieil homme avec un chapeau de paille arrive au jardin. \"Ah, tu as trouv\u00e9 mes graines !\" C'est Monsieur Jardinier, qui avait perdu le sachet. \"Ces graines viennent d'un pays tr\u00e8s lointain o\u00f9 tout pousse \u00e0 l'envers. L\u00e0-bas, la pluie monte du sol vers le ciel et les arbres ont les racines en l'air. Les plantes ne sont pas bizarres. Elles sont juste... diff\u00e9rentes.\" {personnage} comprend quelque chose d'important. Diff\u00e9rent ne veut pas dire mauvais." },
        { title: 'Le jardin attaqu\u00e9', emoji: '\uD83D\uDE31', text: "Le soir, catastrophe ! Quelqu'un a vers\u00e9 du d\u00e9sherbant sur les plantes \u00e0 l'envers pendant la nuit ! Les feuilles bleues deviennent grises. Les fleurs au chocolat se fanent. Les clochettes ne sonnent plus. {personnage} pleure en voyant le d\u00e9sastre. Qui a pu faire \u00e7a ? {objet} est au milieu des plantes ab\u00eem\u00e9es. {personnage} a le coeur bris\u00e9. M\u00eame la petite Lina pleure en voyant ses plantes pr\u00e9f\u00e9r\u00e9es mourir." },
        { title: 'Le coupable inattendu', emoji: '\uD83D\uDE22', text: "Monsieur Grumeau arrive, la t\u00eate basse. \"C'est moi\", murmure-t-il. \"J'ai mis le d\u00e9sherbant. Je pensais que ces plantes \u00e9taient dangereuses parce qu'elles \u00e9taient diff\u00e9rentes. J'avais peur. Je suis d\u00e9sol\u00e9.\" {personnage} est en col\u00e8re, puis triste, puis... il voit les yeux de Monsieur Grumeau. Il a vraiment l'air malheureux. Parfois, les gens font de mauvaises choses parce qu'ils ont peur de ce qu'ils ne connaissent pas." },
        { title: 'La r\u00e9surrection', emoji: '\u2728', text: "Monsieur Jardinier revient avec un arrosoir sp\u00e9cial. \"Cette eau vient du m\u00eame pays que les graines !\" Il arrose les plantes ab\u00eem\u00e9es. Au d\u00e9but, rien. Puis... les feuilles bleues retrouvent leur couleur ! Les fleurs au chocolat se redressent ! Les clochettes se remettent \u00e0 sonner ! DING DING DING ! Mais ce n'est pas tout : les plantes poussent ENCORE PLUS BELLES qu'avant. Et Monsieur Grumeau, bouche b\u00e9e, murmure : \"C'est... c'est magnifique.\" {objet} brille dans la lumi\u00e8re." },
        { title: 'Le jardin de tout le monde', emoji: '\uD83C\uDF3B', text: "Monsieur Grumeau demande pardon \u00e0 {personnage} et aux plantes. Il propose de les aider \u00e0 faire un jardin pour tout le quartier \u00e0 {lieu}. Avec des plantes normales ET des plantes \u00e0 l'envers. Ensemble, ils creusent, plantent et arrosent. Monsieur Grumeau d\u00e9couvre qu'il ADORE jardiner. En automne, on plante les bulbes. Au printemps, on s\u00e8me. En \u00e9t\u00e9, on arrose. Chaque saison apporte ses surprises." },
        { title: 'Le plus beau jardin', emoji: '\uD83C\uDF1F', text: "Des mois plus tard, le jardin de {lieu} est le plus beau du quartier. Des plantes normales c\u00f4toient des plantes \u00e0 l'envers. Des fraises poussent \u00e0 c\u00f4t\u00e9 de pommes en \u00e9toile. Des roses sentent bon \u00e0 c\u00f4t\u00e9 des fleurs au chocolat. Monsieur Grumeau est devenu le plus grand fan du jardin. {personnage} s'assoit le soir avec {objet} et \u00e9coute les clochettes. Ce qui est diff\u00e9rent n'est pas \u00e0 craindre. C'est \u00e0 d\u00e9couvrir, \u00e0 comprendre et \u00e0 aimer. Bonne nuit, petit jardinier !" }

      // Template 0 — Le m\u00e9chant sorcier qui \u00e9tait un b\u00e9b\u00e9
      [
        { title: "L'ombre dans la nuit", emoji: '\uD83C\uDF19', text: "BOUM ! BOUM ! BOUM ! De terribles coups r\u00e9sonnent \u00e0 la porte de {lieu}. Tout le monde tremble. \"C'est le Sorcier Noir !\" chuchote un lutin en se cachant sous un champignon. \"Il veut voler toute la magie du monde !\" {personnage} attrape {objet} et court voir. Dehors, une ombre gigantesque se dresse. Elle est noire comme la nuit et ses yeux brillent comme deux braises rouges. BOUM ! La porte tremble encore !" },
        { title: 'Face au Sorcier Noir', emoji: '\uD83D\uDE08', text: "{personnage} ouvre la porte. Le Sorcier Noir est L\u00c0. Il est \u00e9norme, terrifiant, avec une cape qui flotte comme de la fum\u00e9e. \"DONNEZ-MOI TOUTE VOTRE MAGIE !\" hurle-t-il. Sa voix fait trembler les murs. Les feuilles des arbres de {lieu} deviennent grises de peur. Mais attendez... {personnage} remarque quelque chose. La voix du Sorcier Noir, sous les grondements... elle est toute fine. Comme une voix de b\u00e9b\u00e9." },
        { title: 'Le duel magique', emoji: '\u2728', text: "{personnage} l\u00e8ve {objet} et lance un sortil\u00e8ge de lumi\u00e8re. FLASH ! Le Sorcier Noir recule en se prot\u00e9geant les yeux. Il lance une boule de fum\u00e9e noire. POUF ! {personnage} fait un bouclier de bulles de savon magiques. Les bulles absorbent la fum\u00e9e et deviennent des bulles arc-en-ciel. C'est magnifique ! Les couleurs naissent quand la lumi\u00e8re traverse les bulles, comme quand le soleil traverse la pluie et fait un arc-en-ciel." },

      // Template 0 — Le robot qui avait peur du noir
      [
        { title: 'Bip boup, bonne nuit', emoji: '\uD83C\uDF19', text: "C'est l'heure de dormir \u00e0 {lieu}. Les lumi\u00e8res s'\u00e9teignent une par une. Clic, clic, clic. Tous les robots vont en mode veille. Mais {personnage} ne veut pas dormir. Pourquoi ? Parce qu'il a PEUR DU NOIR. Quand les lumi\u00e8res s'\u00e9teignent, les ombres ressemblent \u00e0 des monstres. Les machines font des bruits bizarres : crrrr, tsssss, clang ! {personnage} serre {objet} tr\u00e8s fort. Ses yeux clignotent de peur : rouge, rouge, rouge." },
        { title: 'La nuit est longue', emoji: '\uD83D\uDC40', text: "{personnage} essaie de rester \u00e9veill\u00e9 toute la nuit. Les couloirs de {lieu} sont sombres et effrayants. Une ombre passe ! {personnage} sursaute : \"BIIP !\" Mais ce n'est qu'un petit robot-souris qui cherche des vis perdues. Un bruit de cha\u00eene ! Ce n'est que le chauffage. Un grondement ! C'est juste le frigo de la cantine. Tout a une explication, mais dans le noir, l'imagination invente des monstres partout." },
        { title: 'Le robot lumineux', emoji: '\uD83D\uDCA1', text: "Le matin arrive enfin. {personnage} est \u00e9puis\u00e9. Ses circuits surchauffent de fatigue. Bzzzzz ! Il s'endort en plein milieu du petit-d\u00e9jeuner d'huile. SPLASH ! Son nez tombe dans le bol. Les autres robots rient. \"Pourquoi tu es si fatigu\u00e9 ?\" demande Zap, un petit robot jaune. {personnage} a honte d'avouer. \"Un robot ne devrait pas avoir peur du noir\", pense-t-il. C'est faux ! Tout le monde peut avoir peur, m\u00eame les robots." },
        { title: 'Le secret de Zap', emoji: '\uD83E\uDD2B', text: "Zap s'approche de {personnage}. \"Moi aussi j'avais peur du noir\", chuchote-t-il. \"QUOI ? Toi ?\" Zap hoche la t\u00eate. \"Jusqu'\u00e0 ce que je d\u00e9couvre quelque chose de g\u00e9nial dans le noir. Viens ce soir, je te montrerai.\" {personnage} h\u00e9site. Retourner dans le noir ? Rien que d'y penser, ses engrenages se crispent. Mais Zap a l'air sinc\u00e8re. Et {objet} vibre doucement, comme pour encourager. \"D'accord\", murmure {personnage}." },
        { title: "L'exp\u00e9dition nocturne", emoji: '\uD83D\uDD26', text: "Ce soir, Zap emm\u00e8ne {personnage} dans les couloirs sombres de {lieu}. Le coeur m\u00e9canique de {personnage} fait tic-tac tr\u00e8s vite. Zap murmure : \"Ferme les yeux et \u00c9COUTE.\" {personnage} ferme les yeux (c'est encore plus noir !). Et l\u00e0... il entend des sons qu'il n'avait jamais remarqu\u00e9s. Le ronronnement doux des machines. Le tic-tac r\u00e9gulier de l'horloge. Le murmure du vent dans les conduits. C'est... paisible." },
        { title: 'Les lucioles m\u00e9caniques', emoji: '\u2B50', text: "Zap conduit {personnage} sur le toit de {lieu}. Et l\u00e0, SURPRISE ! Des dizaines de petites lucioles m\u00e9caniques dansent dans le ciel noir ! Elles clignotent : vert, bleu, dor\u00e9, rose. C'est MAGNIFIQUE. \"Elles ne sortent que la nuit\", explique Zap. \"Elles fonctionnent \u00e0 l'\u00e9nergie de la lune. Si tu restes dans la lumi\u00e8re, tu ne les vois jamais.\" {personnage} est bouche b\u00e9e. Le noir cache des merveilles qu'on ne peut voir que dans l'obscurit\u00e9 !" },
        { title: 'Le monstre r\u00e9v\u00e9l\u00e9', emoji: '\uD83D\uDE31', text: "Soudain, un \u00c9NORME bruit ! CRAAAANG ! Une ombre gigantesque appara\u00eet derri\u00e8re les lucioles. {personnage} attrape Zap. \"UN MONSTRE !\" Mais Zap \u00e9clate de rire. \"Regarde bien !\" {objet} \u00e9claire l'ombre et... c'est le vieux robot concierge ! Il r\u00e9pare une antenne sur le toit. Son ombre est rendue g\u00e9ante par la lune derri\u00e8re lui. \"Bonsoir les petits ! Vous regardez mes lucioles ?\" L'ombre terrifiante \u00e9tait en fait un gentil papy robot." },
        { title: 'Le concierge raconte', emoji: '\uD83C\uDF19', text: "Le vieux concierge s'assoit avec eux. \"Moi aussi j'avais peur du noir quand j'\u00e9tais petit\", dit-il. \"Mais tu sais quoi ? Le noir, c'est juste l'absence de lumi\u00e8re. Ce n'est pas un ennemi. C'est comme le silence : il n'y a rien de dangereux dedans, juste du calme.\" Il explique que les yeux s'habituent au noir au bout de quelques minutes. C'est vrai ! {personnage} voit de mieux en mieux sans lumi\u00e8re. Les \u00e9toiles brillent comme des petites lampes naturelles." },
        { title: "L'invention lumineuse", emoji: '\uD83D\uDD27', text: "{personnage} a une id\u00e9e g\u00e9niale ! Avec {objet}, il fabrique une petite veilleuse en forme d'\u00e9toile. Elle projette des lucioles m\u00e9caniques sur les murs. Pas trop de lumi\u00e8re, juste assez pour rassurer. \"C'est comme avoir un petit morceau de nuit magique dans sa chambre !\" dit {personnage}. {objet} tourne doucement en projetant des formes. Zap en veut une aussi. Et le concierge. Et bient\u00f4t, toute {lieu} !" },
        { title: 'Bonne nuit, brave robot', emoji: '\uD83C\uDF1F', text: "Ce soir, {personnage} se couche avec sa veilleuse-\u00e9toile. Les lucioles dansent doucement sur les murs. Le noir n'est plus effrayant. C'est doux, calme et plein de jolies choses cach\u00e9es. Sous la couverture, {objet} repose \u00e0 c\u00f4t\u00e9 de {personnage}. Dehors, les vraies lucioles m\u00e9caniques brillent sur le toit. Le vieux concierge siffle une chanson. Zap dort d\u00e9j\u00e0, un sourire aux l\u00e8vres. Le noir n'est pas un ennemi. C'est un ami timide qui cache ses plus beaux tr\u00e9sors. Bonne nuit, brave petit robot !" }

      // Template 1 — Le robot qui recyclait tout
      [
        { title: 'La montagne de d\u00e9chets', emoji: '\uD83D\uDDD1\uFE0F', text: "{personnage} se prom\u00e8ne \u00e0 {lieu} quand il d\u00e9couvre quelque chose de terrible : une MONTAGNE de d\u00e9chets ! Des vieux tuyaux rouill\u00e9s, des fils emm\u00eal\u00e9s, des \u00e9crans cass\u00e9s et des bo\u00eetes vides. Les robots jettent tout n'importe o\u00f9. \"Beurk !\" dit {personnage}. L'odeur d'huile br\u00fbl\u00e9e pique le nez. Les petits oiseaux m\u00e9caniques ne chantent plus. M\u00eame les fleurs en m\u00e9tal sont couvertes de poussi\u00e8re. {objet} clignote comme un signal d'alarme." },
        { title: "L'id\u00e9e du tri", emoji: '\uD83D\uDCA1', text: "{personnage} r\u00e9fl\u00e9chit. \"Si on triait les d\u00e9chets, on pourrait r\u00e9utiliser plein de choses !\" Le m\u00e9tal peut \u00eatre fondu pour faire de nouvelles pi\u00e8ces. Le plastique peut devenir de nouveaux bo\u00eetiers. Les circuits peuvent \u00eatre r\u00e9par\u00e9s. C'est \u00e7a, le RECYCLAGE ! Transformer les vieux trucs en trucs neufs au lieu de tout jeter. {personnage} prend {objet} et commence \u00e0 trier. Les m\u00e9taux dans la poubelle bleue, les circuits dans la verte, le reste dans la jaune." },
        { title: 'Les moqueries', emoji: '\uD83D\uDE12', text: "Les autres robots passent et se moquent. \"Pourquoi tu fouilles dans les poubelles ? C'est sale et c'est nul !\" Un gros robot, Crank, rit tr\u00e8s fort : \"HA HA HA ! Le petit robot poubelle !\" \u00c7a fait mal. {personnage} a envie d'arr\u00eater. Mais en regardant la montagne de d\u00e9chets, il sait que c'est important. {objet} se met \u00e0 briller pour donner du courage. Faire ce qui est bien, m\u00eame quand les autres rient, c'est \u00e7a le vrai courage." },
        { title: 'La panne de Crank', emoji: '\u26A1', text: "Le lendemain, CATASTROPHE ! Crank, le gros robot moqueur, tombe en panne ! Son moteur fait des bruits horribles : CRRRRK CRRRRK CRRRRK ! Il a besoin d'un engrenage de taille 7 pour \u00eatre r\u00e9par\u00e9. Mais il n'y en a plus en stock \u00e0 {lieu}. Il faudrait des semaines pour en commander un. Crank est d\u00e9sesp\u00e9r\u00e9. \"Sans moteur, je ne peux plus bouger !\" Il est coinc\u00e9, immobile, au milieu du couloir." },
        { title: "L'engrenage retrouv\u00e9", emoji: '\u2699\uFE0F', text: "{personnage} va voir sa collection de pi\u00e8ces tri\u00e9es. Il cherche, cherche... et trouve ! Un engrenage de taille 7, en parfait \u00e9tat, r\u00e9cup\u00e9r\u00e9 dans la montagne de d\u00e9chets ! Quelqu'un l'avait jet\u00e9 alors qu'il marchait encore. {personnage} court vers Crank avec la pi\u00e8ce et {objet}. \"Attends, je vais te r\u00e9parer !\" Crank n'en revient pas. \"Toi ? Tu m'aides ? Apr\u00e8s que je me suis moqu\u00e9 de toi ?\" {personnage} sourit. \"Bien s\u00fbr. C'est \u00e7a, les amis.\"" },
        { title: 'La r\u00e9paration', emoji: '\uD83D\uDD27', text: "Avec {objet}, {personnage} installe l'engrenage dans le moteur de Crank. Un levier pour soulever le panneau. Un tournevis pour fixer la pi\u00e8ce. Les engrenages, ce sont des roues avec des dents qui s'embo\u00eetent les unes dans les autres. Quand un tourne, il fait tourner le suivant. C'est comme \u00e7a que les machines transmettent le mouvement. CLIC ! L'engrenage est en place. Crank d\u00e9marre son moteur. VROOOOM ! \u00c7a marche !" },
        { title: 'Le changement de Crank', emoji: '\u2764\uFE0F', text: "Crank se l\u00e8ve et fait trois tours sur lui-m\u00eame de bonheur. \"YOUHOU ! Je remarche !\" Puis il s'arr\u00eate et regarde {personnage}. \"Merci. Et... pardon d'avoir \u00e9t\u00e9 m\u00e9chant. Tu avais raison pour le recyclage. Sans ta collection de pi\u00e8ces, je serais encore en panne.\" Crank rougit (ses joues m\u00e9talliques deviennent orange). \"Je veux t'aider \u00e0 trier les d\u00e9chets.\" {personnage} sourit si fort que ses diodes clignotent de joie." },
        { title: "L'usine de recyclage", emoji: '\uD83C\uDFED', text: "Ensemble, {personnage} et Crank construisent une mini-usine de recyclage \u00e0 {lieu} ! Les vieilles pi\u00e8ces entrent d'un c\u00f4t\u00e9, et des pi\u00e8ces neuves sortent de l'autre. C'est magique ! {objet} sert de g\u00e9n\u00e9rateur d'\u00e9nergie pour la machine. Les autres robots viennent voir, curieux. \"Waouh, c'est g\u00e9nial !\" dit un petit robot. Bient\u00f4t, tout le monde apporte ses vieux trucs \u00e0 recycler. La montagne de d\u00e9chets r\u00e9tr\u00e9cit \u00e0 vue d'oeil." },
        { title: 'La sculpture d\u00e9chets', emoji: '\uD83C\uDFA8', text: "Avec les derniers d\u00e9chets, {personnage} et Crank fabriquent une \u00c9NORME sculpture : un arbre m\u00e9canique fait de vieilles pi\u00e8ces ! Les branches sont des tuyaux, les feuilles sont des circuits, et le tronc est fait de plaques de m\u00e9tal. Au sommet, une ampoule brille comme un soleil. C'est la plus belle chose de tout {lieu}. \"Rien n'est jamais compl\u00e8tement inutile\", dit {personnage}. \"Il suffit d'imaginer une nouvelle vie pour les vieilles choses.\"" },
        { title: 'Rien ne se perd', emoji: '\uD83C\uDF1F', text: "Ce soir, {lieu} est propre et beau. Plus de montagne de d\u00e9chets. \u00c0 la place, l'arbre m\u00e9canique brille sous les \u00e9toiles. {personnage} et Crank sont assis dessous avec {objet}. \"Tu sais\", dit Crank, \"je pensais que jeter c'\u00e9tait plus facile que recycler. Mais recycler, c'est tellement plus beau.\" {personnage} acquiesce. Rien ne se perd, tout se transforme. Un vieux d\u00e9chet peut devenir un tr\u00e9sor si on prend le temps de s'en occuper. Bonne nuit, petit robot \u00e9colo !" }

        { title: "L'invitation refus\u00e9e", emoji: '\uD83D\uDC4B', text: "Les petits robots Flip et Flap invitent {personnage} \u00e0 jouer. \"Viens faire une course avec nous !\" Flip fait des galipettes dans le couloir. Flap jongle avec des vis. CLING CLING CLING ! \"Non merci\", dit {personnage}. \"J'ai du travail.\" Flip et Flap repartent, un peu tristes. {personnage} retourne \u00e0 son rangement. Mais son coeur m\u00e9canique fait un dr\u00f4le de bruit. Pas tic-tac. Plut\u00f4t... cling. Comme s'il manquait quelque chose." },
        { title: 'Le bug', emoji: '\u26A0\uFE0F', text: "Un jour, {personnage} se met \u00e0 BUGUER. Ses bras font n'importe quoi ! Le bras gauche range un tournevis dans le frigo. Le bras droit met du dentifrice sur une vis. Les jambes marchent en arri\u00e8re. \"ERREUR SYST\u00c8ME !\" clignote l'\u00e9cran sur sa poitrine. Le docteur robot l'examine. \"Hmm, ton programme de JOIE est d\u00e9sactiv\u00e9. Un robot qui ne joue jamais accumule de l'\u00e9nergie non utilis\u00e9e et \u00e7a fait buguer les circuits. Prescription : JOUER !\"" },
        { title: 'Le premier essai', emoji: '\uD83C\uDFB2', text: "{personnage} doit jouer, sinon les bugs vont empirer. Mais il ne sait pas comment ! Flip et Flap essaient de l'aider. \"Attrape la balle !\" Flap lance une balle. {personnage} tend les bras et... la balle rebondit sur sa t\u00eate. BOING ! \"Lance-la maintenant !\" {personnage} lance la balle qui fait trois rebonds au plafond et tombe dans un pot de peinture. SPLASH ! Tout le monde est \u00e9clabousse de bleu. Oups." },
        { title: 'Le rire interdit', emoji: '\uD83D\uDE02', text: "Et l\u00e0, quelque chose d'incroyable se passe. Flip a de la peinture bleue sur le nez. Flap en a sur les oreilles. {personnage} en a plein le ventre. C'est tellement ridicule que... {personnage} \u00c9CLATE DE RIRE ! \"HA HA HA BIP HA !\" C'est son PREMIER rire ! Les circuits de joie s'allument d'un coup. Les bugs disparaissent. {objet} se met \u00e0 tournoyer tout seul. \"Tu as ri ! Tu as RI !\" crient Flip et Flap en sautant de joie." },
        { title: 'Le jour du jeu', emoji: '\uD83C\uDFAE', text: "\u00c0 partir de ce jour, {personnage} apprend \u00e0 jouer un peu chaque jour. Cache-cache dans {lieu} : les robots se cachent derri\u00e8re les machines. \"Coucou, je te vois !\" Colin-maillard : {personnage} a un bandeau sur les yeux et attrape... une poubelle. \"Ce n'est pas un robot, \u00e7a !\" Construction de tours : qui fait la plus haute ? {personnage} construit une tour de 47 \u00e9tages. Record battu ! {objet} sert de pi\u00e8ce du sommet." },
        { title: 'Le programme if-then', emoji: '\uD83D\uDCBB', text: "Flip et Flap montrent un jeu \u00e0 {personnage} : le jeu du SI-ALORS. C'est comme la logique des ordinateurs ! \"SI je tape des mains, ALORS tu sautes. SI je siffle, ALORS tu tournes.\" CLAP ! {personnage} saute. SIIIIFFF ! {personnage} tourne. \"SI je tape ET je siffle, ALORS tu sautes ET tu tournes !\" CLAP SIIIIFFF ! {personnage} saute et tourne en m\u00eame temps et tombe par terre. Tout le monde rit. C'est de la programmation en jouant !" },
        { title: 'Le rangement fun', emoji: '\u2728', text: "{personnage} d\u00e9couvre un secret g\u00e9nial : on peut JOUER en rangeant ! Il invente le \"Rangement Musical\" : quand la musique joue, on range. Quand elle s'arr\u00eate, on fait une statue rigolote. FREEZE ! {personnage} se fige en flamant rose m\u00e9canique. Flip se fige en avion. Flap se fige la t\u00eate en bas. Tout {lieu} est rang\u00e9 en vingt minutes et tout le monde a ri. {objet} lance la musique et tout le monde danse-range." },
        { title: 'Le spectacle', emoji: '\uD83C\uDFAD', text: "{personnage} organise le premier \"Festival du Jeu\" de {lieu}. Il y a des courses d'obstacles, des concours de grimaces, des batailles de confettis m\u00e9caniques. {personnage}, l'ancien robot s\u00e9rieux, est au centre de tout, les bras en l'air, les yeux brillants de joie. Son \u00e9cran de poitrine n'affiche plus \"ERREUR\" mais un grand smiley. M\u00eame le docteur robot participe et rit tellement que sa blouse se d\u00e9boutonne." },

        { title: 'Le colis myst\u00e9rieux', emoji: '\uD83D\uDCE6', text: "Un matin, un colis appara\u00eet au milieu de {lieu}. Personne ne l'a apport\u00e9. Il est juste... L\u00c0. Le colis est fait d'un m\u00e9tal inconnu qui brille d'une lumi\u00e8re violette. Il y a un \u00e9cran dessus qui affiche : \"POUR {personnage}. NE PAS OUVRIR AVANT 10H00.\" Il est 9h30. {personnage} tourne autour du colis. Qu'est-ce que c'est ? D'o\u00f9 \u00e7a vient ? {objet} vibre d'excitation. Trente minutes \u00e0 attendre, c'est une \u00c9TERNIT\u00c9 !" },

        { title: 'Personne ne croit', emoji: '\uD83D\uDE12', text: "{personnage} court pr\u00e9venir le directeur de {lieu}. \"Le g\u00e9n\u00e9rateur va surchauffer \u00e0 midi !\" Le directeur rit. \"Impossible ! Nos machines sont parfaites. Et un message du futur ? N'importe quoi !\" Personne ne veut \u00e9couter. \"Tu racontes des b\u00eatises\", disent les autres robots. {personnage} est d\u00e9courag\u00e9. Mais {objet} vibre de plus en plus fort. Le plan du futur est l\u00e0. L'horloge dit 11h00. Il reste une heure." },

        { title: 'Le soleil triste', emoji: '\u2B50', text: "Avec {objet}, {personnage} s'approche du soleil endormi. En l'examinant, {personnage} d\u00e9couvre la v\u00e9rit\u00e9 : le soleil n'est pas \u00e9teint, il est TRISTE ! Un soleil est fait de gaz tr\u00e8s chaud. Quand il est heureux, le gaz br\u00fble et produit de la lumi\u00e8re et de la chaleur. Mais quand il est triste, le gaz se refroidit et le soleil s'\u00e9teint. \"Pourquoi tu es triste, petit soleil ?\" murmure {personnage}." },
        { title: "L'histoire du soleil", emoji: '\uD83D\uDE22', text: "Le soleil parle d'une voix toute faible, comme une flamme qui vacille : \"Personne ne me dit jamais merci. Chaque jour, je me l\u00e8ve, je brille, je r\u00e9chauffe tout le monde. Mais personne ne l\u00e8ve les yeux. Personne ne dit : merci, soleil, pour cette belle journ\u00e9e. Alors j'ai d\u00e9cid\u00e9 d'arr\u00eater.\" {personnage} sent son coeur se serrer. C'est vrai que personne ne pense \u00e0 remercier le soleil. On le trouve normal. Mais sans lui, tout s'arr\u00eate." },

        { title: 'La liste des merveilles', emoji: '\uD83D\uDCDD', text: "{personnage} fait la liste de tout ce que la Gravit\u00e9 permet : marcher sur le sol, que la pluie tombe, que les rivi\u00e8res coulent, que la Lune tourne autour de la Terre, que la Terre tourne autour du Soleil, que les plan\u00e8tes restent en place, que les \u00e9toiles forment des galaxies. \"Sans toi, l'univers entier se disperserait comme des confettis dans le vent. Tu es celle qui tient TOUT ensemble !\" La Gravit\u00e9 rougit (si une force invisible peut rougir)." },
        { title: 'Le retour de la Gravit\u00e9', emoji: '\uD83C\uDF89', text: "La Gravit\u00e9 se l\u00e8ve de sa plage cosmique. \"D'accord, je reviens. Mais \u00e0 une condition : chaque jour, quelqu'un doit dire merci \u00e0 une chose invisible mais importante.\" \"March\u00e9 conclu !\" dit {personnage}. La Gravit\u00e9 prend une grande inspiration et souffle. WHOOOOOMP ! La force invisible se r\u00e9pand dans l'espace \u00e0 la vitesse de la lumi\u00e8re. La lumi\u00e8re voyage \u00e0 300 000 kilom\u00e8tres par seconde. C'est la chose la plus rapide de l'univers !" },
        { title: 'Tout retombe', emoji: '\uD83C\uDF0D', text: "\u00c0 {lieu}, tout retombe d'un coup ! BOUM, SPLASH, PATATRAS ! Les gens atterrissent sur le sol. Les voitures se posent. L'eau retombe dans la fontaine. Le bonhomme de neige se reconstruit. \"HOURRA !\" crient tous les habitants. Ils touchent le sol avec bonheur. Marcher, courir, sauter et retomber. Des choses simples qui semblent normales mais qui sont MAGIQUES quand on y pense. {objet} tombe doucement dans la main de {personnage}." },
        { title: 'La journ\u00e9e du merci', emoji: '\uD83D\uDC9A', text: "Pour tenir la promesse faite \u00e0 la Gravit\u00e9, {personnage} invente la \"Journ\u00e9e du Merci Invisible\". Chacun dit merci \u00e0 une chose invisible mais essentielle. \"Merci, l'air, de nous laisser respirer !\" \"Merci, la chaleur, de nous garder au chaud !\" \"Merci, le sommeil, de nous r\u00e9parer la nuit !\" C'est une journ\u00e9e magnifique. Les gens sourient en pensant \u00e0 toutes ces merveilles invisibles qui les entourent." },
        { title: 'La force invisible', emoji: '\uD83C\uDF1F', text: "Ce soir, {personnage} est bien les pieds sur le sol, \u00e0 {lieu}. Les \u00e9toiles brillent. La Lune est ronde et argent\u00e9e, tenue en orbite par la Gravit\u00e9. {objet} repose sagement sur la table (il ne flotte plus !). {personnage} murmure : \"Merci, Gravit\u00e9.\" Quelque part dans l'espace, une force invisible sourit. Les choses les plus importantes sont souvent celles qu'on ne voit pas. L'amour, l'amiti\u00e9, la gravit\u00e9... elles tiennent le monde ensemble. Bonne nuit, ami de l'invisible !" }

      // Template 3 — Le jour et la nuit
      [
        { title: 'La dispute cosmique', emoji: '\uD83C\uDF1E', text: "\"C'EST MOI LE PLUS IMPORTANT !\" crie le Jour en projetant des rayons dor\u00e9s. \"NON, C'EST MOI !\" crie la Nuit en \u00e9tendant son manteau d'\u00e9toiles. Le Jour et la Nuit se disputent \u00e0 {lieu} ! Le Jour veut briller tout le temps : \"Les gens m'aiment, je suis chaud et lumineux !\" La Nuit veut r\u00e9gner tout le temps : \"Les gens ont besoin de dormir et mes \u00e9toiles sont magnifiques !\" {personnage} les regarde se chamailler, {objet} en main." },
        { title: 'Le Jour sans Nuit', emoji: '\u2600\uFE0F', text: "Le Jour gagne la premi\u00e8re manche et brille SANS ARR\u00caT pendant trois jours. Pas de nuit du tout ! Au d\u00e9but, les gens sont contents. Mais tr\u00e8s vite, c'est horrible. Personne ne peut dormir ! Les yeux sont fatigu\u00e9s. Les fleurs ne se ferment jamais. Les hiboux sont perdus. La temp\u00e9rature monte sans cesse parce que le soleil tape toute la journ\u00e9e. {personnage} a les yeux tout rouges de fatigue. {objet} surchauffe. \"Assez ! On a besoin de la nuit !\"" },
        { title: 'La Nuit sans Jour', emoji: '\uD83C\uDF11', text: "La Nuit prend le relais et fait nuit TOUT LE TEMPS. Au d\u00e9but, les gens dorment bien. Mais au bout de trois jours, c'est horrible aussi. Il fait froid, tr\u00e8s froid. Les plantes ne poussent plus sans lumi\u00e8re du soleil. Les enfants ne peuvent plus jouer dehors. Les oiseaux ne chantent plus. Tout est triste et gris. Sans lumi\u00e8re, la Terre se refroidit car c'est le Soleil qui la r\u00e9chauffe pendant le jour. {personnage} frissonne. \"Assez ! On a besoin du jour aussi !\"" },
        { title: "L'id\u00e9e de {personnage}", emoji: '\uD83D\uDCA1', text: "{personnage} r\u00e9unit le Jour et la Nuit. \"\u00c9coutez-moi ! Vous \u00eates AUSSI importants l'un que l'autre. Le jour, on travaille, on joue, on rit. La nuit, on dort, on r\u00eave, on se repose. L'un ne peut pas exister sans l'autre !\" Le Jour croise les bras. La Nuit boude. \"Prouve-le\", disent-ils ensemble. {personnage} sourit et l\u00e8ve {objet}. Il a un plan." },
        { title: 'Le coucher de soleil', emoji: '\uD83C\uDF05', text: "{personnage} emm\u00e8ne le Jour et la Nuit au bord d'un crat\u00e8re de {lieu}. \"Regardez. Le plus beau moment de la journ\u00e9e, c'est lequel ? C'est le moment o\u00f9 le jour RENCONTRE la nuit !\" {objet} projette un coucher de soleil magnifique. Le ciel devient orange, rose, violet et bleu fonc\u00e9. C'est splendide ! Le Jour et la Nuit \u00e9carquillent les yeux. Ce m\u00e9lange de leurs couleurs est plus beau que tout ce qu'ils pourraient faire seuls." },
        { title: "L'aube magique", emoji: '\uD83C\uDF04', text: "\"Et maintenant, l'aube !\" {objet} projette le lever du soleil. Le noir de la nuit s'\u00e9claire tout doucement. Le ciel passe du bleu profond au rose p\u00e2le, puis au dor\u00e9. Les premi\u00e8res \u00e9toiles s'\u00e9teignent pendant que le soleil monte. Les oiseaux chantent leur premi\u00e8re note. La ros\u00e9e brille sur les feuilles. \"C'est quand la nuit laisse la place au jour que la magie arrive\", dit {personnage}. Le Jour et la Nuit sont bouche b\u00e9e." },
        { title: 'La r\u00e9conciliation', emoji: '\uD83E\uDD1D', text: "Le Jour regarde la Nuit. La Nuit regarde le Jour. \"Tu sais quoi\", dit le Jour, \"tes \u00e9toiles sont vraiment belles.\" La Nuit rougit (enfin, elle scintille). \"Et ta lumi\u00e8re est vraiment chaude et agr\u00e9able.\" Ils se serrent la main (enfin, ils m\u00ealent leurs couleurs). Et l\u00e0, un ph\u00e9nom\u00e8ne incroyable se produit : un cr\u00e9puscule permanent entoure {lieu}. Un moment magique entre jour et nuit, entre lumi\u00e8re et ombre, entre chaud et frais. C'est magnifique." },
        { title: "L'accord", emoji: '\u2696\uFE0F', text: "Le Jour et la Nuit signent un accord cosmique. Le Jour brillera pendant environ 12 heures, puis la Nuit prendra le relais pendant 12 heures. C'est pour \u00e7a que sur Terre, la rotation de la plan\u00e8te fait alterner le jour et la nuit. La Terre tourne sur elle-m\u00eame en 24 heures. Le c\u00f4t\u00e9 face au Soleil a le jour, le c\u00f4t\u00e9 oppos\u00e9 a la nuit. \"March\u00e9 conclu !\", disent-ils. {personnage} applaudit avec {objet}." },
        { title: 'Les saisons en bonus', emoji: '\uD83C\uDF43', text: "En bonus, le Jour et la Nuit cr\u00e9ent les SAISONS. En \u00e9t\u00e9, le Jour brille plus longtemps. En hiver, c'est la Nuit qui reste plus longtemps. Au printemps et en automne, ils se partagent le temps \u00e0 parts \u00e9gales. \"Comme \u00e7a, personne ne s'ennuie !\" dit le Jour. \"Et les enfants d\u00e9couvrent la neige, les fleurs, le soleil et les feuilles qui tombent !\" ajoute la Nuit. {personnage} hoche la t\u00eate avec {objet}. Chaque saison est un cadeau." },
        { title: 'Le plus beau moment', emoji: '\uD83C\uDF1F', text: "Ce soir, {personnage} regarde le coucher de soleil depuis {lieu}. Le ciel explose de couleurs : orange, rose, violet, bleu. C'est le moment o\u00f9 le Jour dit bonsoir et la Nuit dit bonjour. {objet} brille dans les derni\u00e8res lueurs. {personnage} sait maintenant que le jour et la nuit ne sont pas ennemis. Ils sont partenaires, comme les deux faces d'une m\u00eame pi\u00e8ce. Et le plus beau moment, c'est quand ils se rencontrent. Bonne nuit, petit astronome !" }

      // Template 0 — La visite chez le docteur
      [
        { title: 'La lettre du docteur', emoji: '\uD83D\uDCE8', text: "Ce matin, Maman donne une lettre \u00e0 {personnage}. \"C'est l'heure de ta visite m\u00e9dicale \u00e0 {lieu}.\" Le coeur de {personnage} se met \u00e0 battre tr\u00e8s fort. Le docteur ! Les docteurs font des piq\u00fbres, non ? Et ils ont des instruments bizarres. {personnage} serre {objet} tr\u00e8s fort. \"Je ne veux pas y aller !\" Maman sourit. \"Tu sais, le docteur est l\u00e0 pour v\u00e9rifier que tu vas bien. C'est comme un contr\u00f4le technique, mais pour les enfants.\"" },
        { title: 'Le trajet', emoji: '\uD83D\uDE97', text: "Dans la voiture, {personnage} regarde par la fen\u00eatre avec {objet} sur les genoux. Tout semble normal dehors, mais dans le ventre de {personnage}, \u00e7a fait des noeuds. \"Et si le docteur trouve quelque chose de grave ?\" \"Les visites m\u00e9dicales servent justement \u00e0 v\u00e9rifier que tout va bien\", explique Maman. \"M\u00eame quand on n'est pas malade, on va chez le docteur une fois par an. C'est pour \u00e7a qu'on appelle \u00e7a un bilan de sant\u00e9.\" {personnage} hoche la t\u00eate, pas tout \u00e0 fait rassur\u00e9." },
        { title: 'La salle d\'attente', emoji: '\uD83D\uDECB\uFE0F', text: "\u00c0 {lieu}, la salle d'attente est pleine de couleurs. Il y a des dessins d'enfants sur les murs, des livres et des jouets. Un petit gar\u00e7on joue avec des cubes. Une petite fille feuillette un album. Personne n'a l'air d'avoir peur. {personnage} s'assoit et regarde autour. Il y a une affiche qui montre le corps humain avec tous les organes. Le coeur est en haut \u00e0 gauche, les poumons ressemblent \u00e0 des \u00e9ponges roses. \"C'est bient\u00f4t \u00e0 nous\", dit Maman. {objet} est bien serr\u00e9 dans les mains." },
        { title: 'La rencontre', emoji: '\uD83D\uDC69\u200D\u2695\uFE0F', text: "La porte s'ouvre. \"Bonjour ! Entre, n'aie pas peur.\" Le docteur a un grand sourire et une voix douce. Son bureau est lumineux. Il y a un mod\u00e8le du squelette dans un coin. \"Waouh, c'est un vrai squelette ?\" demande {personnage}. \"C'est un mod\u00e8le en plastique. Il s'appelle Oscar !\" {personnage} rit un peu. Le docteur n'est pas effrayant du tout. \"Aujourd'hui, on va v\u00e9rifier que ton corps fonctionne bien. Je vais t'expliquer chaque \u00e9tape, d'accord ?\" {personnage} hoche la t\u00eate." },
        { title: 'Les yeux et les oreilles', emoji: '\uD83D\uDC41\uFE0F', text: "\"On commence par les yeux !\" Le docteur montre un tableau avec des lettres de diff\u00e9rentes tailles. \"Lis les lettres que tu vois.\" {personnage} lit : \"E, F, P, T, O, Z...\" Les lettres deviennent de plus en plus petites. \"Excellent ! Tes yeux voient tr\u00e8s bien.\" Ensuite, le docteur regarde dans les oreilles avec un petit appareil lumineux qui s'appelle un otoscope. \"Il y a de la lumi\u00e8re dans mon oreille !\" dit {personnage}. \"C'est pour voir si tout est propre et en bonne sant\u00e9 \u00e0 l'int\u00e9rieur.\" {objet} attend sagement sur la chaise." },
        { title: 'Le coeur qui bat', emoji: '\u2764\uFE0F', text: "\"Maintenant, on \u00e9coute ton coeur.\" Le docteur sort un st\u00e9thoscope. \"C'est froid !\" dit {personnage} quand le m\u00e9tal touche sa poitrine. \"Respire fort... et encore.\" Boum, boum, boum, fait le coeur. \"Ton coeur bat parfaitement bien ! Il bat environ 100 fois par minute chez un enfant. C'est un muscle incroyable qui ne s'arr\u00eate jamais, m\u00eame quand tu dors.\" {personnage} pose la main sur sa poitrine et sent les battements. \"Il travaille tout le temps pour moi ?\" \"Tout le temps, oui !\"" },
        { title: 'La taille et le poids', emoji: '\uD83D\uDCCF', text: "Le docteur mesure {personnage} contre une toise au mur. \"Tu as grandi de trois centim\u00e8tres depuis la derni\u00e8re fois !\" Puis {personnage} monte sur la balance. \"Ton poids est parfait pour ta taille.\" Le docteur dessine un point sur une courbe dans le carnet de sant\u00e9. \"Cette courbe montre comment tu grandis. Chaque enfant grandit \u00e0 son rythme. Certains poussent vite, d'autres doucement, et c'est tout \u00e0 fait normal.\" {personnage} est fi\u00e8re d'avoir grandi. {objet} semble fi\u00e8re aussi." },
        { title: 'Les questions du docteur', emoji: '\uD83D\uDDE3\uFE0F', text: "Le docteur pose des questions. \"Est-ce que tu dors bien la nuit ? Est-ce que tu manges de tout ? Est-ce que tu fais du sport ?\" {personnage} r\u00e9pond \u00e0 chaque question. \"Parfois je n'aime pas les \u00e9pinards.\" Le docteur rit. \"C'est normal de ne pas tout aimer ! L'important, c'est de go\u00fbter un peu de chaque chose. Ton corps a besoin de diff\u00e9rents aliments pour bien grandir.\" Puis le docteur v\u00e9rifie les dents. \"Ouvre grand ! Aaaa !\" Les dents sont belles et blanches." },
        { title: 'Le vaccin courageux', emoji: '\uD83D\uDC89', text: "\"Aujourd'hui, tu as besoin d'un petit vaccin de rappel.\" Le ventre de {personnage} se noue. \"Un vaccin, c'est quoi exactement ?\" \"C'est une toute petite piq\u00fbre qui apprend \u00e0 ton corps \u00e0 se d\u00e9fendre contre les maladies. Comme un entra\u00eenement pour tes d\u00e9fenses.\" L'infirmier d\u00e9sinfecte le bras. \"Tu vas sentir une petite piq\u00fbre, comme une fourmi qui mord.\" {personnage} serre {objet} tr\u00e8s fort, ferme les yeux... \"C'est fini !\" dit l'infirmier. \"D\u00e9j\u00e0 ?!\" C'\u00e9tait rapide comme l'\u00e9clair !" },
        { title: 'Le h\u00e9ros du bilan', emoji: '\uD83C\uDF1F', text: "Le docteur donne un autocollant \u00e0 {personnage}. \"Tu as \u00e9t\u00e9 tr\u00e8s courageux aujourd'hui.\" {personnage} colle l'autocollant sur {objet} et sourit. Dehors, le soleil brille. \"C'\u00e9tait pas si terrible, finalement\", dit {personnage} \u00e0 Maman. \"Le docteur est gentil et il m'a tout expliqu\u00e9.\" Ce soir, dans son lit, {personnage} serre {objet} et repense \u00e0 la journ\u00e9e. Les docteurs ne sont pas l\u00e0 pour faire peur. Ils sont l\u00e0 pour prendre soin de nous et nous aider \u00e0 rester en bonne sant\u00e9. Bonne nuit, petit courageux !" }

      // Template 1 — L'\u00e9pid\u00e9mie de gastro

        { title: 'Les absents', emoji: '\uD83C\uDFEB', text: "Ce matin, \u00e0 {lieu}, quelque chose de bizarre se passe. La moiti\u00e9 des enfants sont absents ! La ma\u00eetresse fait l'appel : \"L\u00e9a ? Absente. Hugo ? Absent. Mia ? Absente.\" M\u00eame la dame de la cantine est malade. \"Qu'est-ce qui se passe ?\" se demande {personnage} en serrant {objet}. \"Tout le monde a mal au ventre depuis hier\", explique un copain. \"Ma soeur a vomi toute la nuit !\" C'est une \u00e9pid\u00e9mie de gastro-ent\u00e9rite qui se r\u00e9pand \u00e0 toute vitesse !" },
        { title: "L'enqu\u00eate", emoji: '\uD83D\uDD0D', text: "{personnage} d\u00e9cide de mener l'enqu\u00eate. Pourquoi tout le monde tombe malade ? \"Les microbes se transmettent quand on ne fait pas attention\", explique la ma\u00eetresse. {personnage} observe attentivement la cour de r\u00e9cr\u00e9ation. Paul \u00e9ternue dans ses mains puis touche la balustrade. Jade mange son go\u00fbter sans se laver les mains. Tom boit dans la bouteille de Louise. \"J'ai compris !\" dit {personnage}. \"Les microbes passent d'un enfant \u00e0 l'autre par les mains et les objets !\" {objet} semble confirmer." },
        { title: 'Les microbes invisibles', emoji: '\uD83E\uDDA0', text: "La ma\u00eetresse fait une exp\u00e9rience g\u00e9niale \u00e0 {lieu}. Elle met de la peinture brillante sur les mains d'un seul enfant. \"Jouez normalement pendant dix minutes.\" Apr\u00e8s dix minutes, la ma\u00eetresse \u00e9teint la lumi\u00e8re et allume une lampe sp\u00e9ciale. SURPRISE ! La peinture est PARTOUT ! Sur les mains de tous les enfants, sur les tables, les poign\u00e9es de porte, les crayons, les livres. \"Voil\u00e0 comment les microbes voyagent\", dit la ma\u00eetresse. {personnage} \u00e9carquille les yeux." },
        { title: 'Le super-pouvoir du savon', emoji: '\uD83E\uDDFC', text: "\"Heureusement, on a une arme secr\u00e8te contre les microbes !\" dit la ma\u00eetresse. \"Le SAVON !\" Elle montre comment bien se laver les mains : mouiller, mettre du savon, frotter les paumes, entre les doigts, le dessus des mains, les poignets, sous les ongles. \"Il faut frotter pendant vingt secondes. C'est le temps de chanter Joyeux anniversaire deux fois !\" Toute la classe chante en se lavant les mains. {personnage} frotte, frotte avec {objet} pos\u00e9 \u00e0 c\u00f4t\u00e9 du lavabo." },
        { title: 'Les r\u00e8gles d\'or', emoji: '\uD83D\uDCCB', text: "{personnage} cr\u00e9e une grande affiche pour {lieu} avec les r\u00e8gles d'or contre les microbes. R\u00e8gle 1 : se laver les mains avant de manger et apr\u00e8s \u00eatre all\u00e9 aux toilettes. R\u00e8gle 2 : \u00e9ternuer et tousser dans son coude, pas dans ses mains. R\u00e8gle 3 : ne pas partager sa bouteille d'eau ou sa cuill\u00e8re. R\u00e8gle 4 : utiliser un mouchoir en papier et le jeter tout de suite. R\u00e8gle 5 : si on est malade, on reste \u00e0 la maison pour ne pas contaminer les autres. Tout le monde recopie les r\u00e8gles." },

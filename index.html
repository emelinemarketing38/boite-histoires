        { title: 'La dispute cosmique', emoji: '\uD83C\uDF1E', text: "\"C'EST MOI LE PLUS IMPORTANT !\" crie le Jour en projetant des rayons dor\u00e9s. \"NON, C'EST MOI !\" crie la Nuit en \u00e9tendant son manteau d'\u00e9toiles. Le Jour et la Nuit se disputent \u00e0 {lieu} ! Le Jour veut briller tout le temps : \"Les gens m'aiment, je suis chaud et lumineux !\" La Nuit veut r\u00e9gner tout le temps : \"Les gens ont besoin de dormir et mes \u00e9toiles sont magnifiques !\" {personnage} les regarde se chamailler." },

        { title: "L'id\u00e9e de {personnage}", emoji: '\uD83D\uDCA1', text: "{personnage} r\u00e9unit le Jour et la Nuit. \"\u00c9coutez-moi ! Vous \u00eates AUSSI importants l'un que l'autre. Le jour, on travaille, on joue, on rit. La nuit, on dort, on r\u00eave, on se repose. L'un ne peut pas exister sans l'autre !\" Le Jour croise les bras. La Nuit boude. \"Prouve-le\", disent-ils ensemble. {personnage} sourit. Il faut leur montrer quelque chose de magnifique." },
        { title: 'Le secret de la Terre', emoji: '\uD83C\uDF0D', text: "{personnage} emm\u00e8ne le Jour et la Nuit au-dessus de la Terre. \"Regardez ! La Terre est ronde et elle TOURNE sur elle-m\u00eame, comme une toupie.\" Le c\u00f4t\u00e9 face au Soleil a le jour. Le c\u00f4t\u00e9 dans l'ombre a la nuit. La Terre fait un tour complet en 24 heures. \"Vous existez EN M\u00caME TEMPS !\", dit {personnage}. \"Quand c'est le jour en France, c'est la nuit au Japon !\" Le Jour et la Nuit sont surpris. Ils ne se battent pas : ils se partagent la Terre !" },
        { title: 'Le coucher de soleil', emoji: '\uD83C\uDF05', text: "{personnage} emm\u00e8ne le Jour et la Nuit au bord de {lieu}. \"Regardez. Le plus beau moment de la journ\u00e9e, c'est lequel ? C'est quand le jour RENCONTRE la nuit !\" Un coucher de soleil appara\u00eet. Le ciel devient orange, rose, violet et bleu fonc\u00e9. C'est splendide ! C'est la Terre qui tourne et nous \u00e9loigne doucement du Soleil. Le Jour et la Nuit \u00e9carquillent les yeux. Ce m\u00e9lange de leurs couleurs est plus beau que tout ce qu'ils pourraient faire seuls." },
        { title: 'La r\u00e9conciliation', emoji: '\uD83E\uDD1D', text: "Le Jour regarde la Nuit. La Nuit regarde le Jour. \"Tu sais quoi\", dit le Jour, \"tes \u00e9toiles sont vraiment belles.\" La Nuit scintille. \"Et ta lumi\u00e8re est vraiment chaude et agr\u00e9able.\" Ils m\u00ealent leurs couleurs et un ph\u00e9nom\u00e8ne incroyable se produit : un cr\u00e9puscule magnifique entoure {lieu}. Un moment magique entre jour et nuit, entre lumi\u00e8re et ombre, entre chaud et frais. {personnage} applaudit. C'est le plus beau spectacle de l'univers !" },
        { title: "L'accord cosmique", emoji: '\u2696\uFE0F', text: "Le Jour et la Nuit signent un accord cosmique. Le Jour brillera pendant environ 12 heures, puis la Nuit prendra le relais pendant 12 heures. C'est pour \u00e7a que la rotation de la Terre fait alterner le jour et la nuit. La Terre tourne sur elle-m\u00eame en 24 heures. Le c\u00f4t\u00e9 face au Soleil a le jour, le c\u00f4t\u00e9 oppos\u00e9 a la nuit. \"March\u00e9 conclu !\", disent-ils. {personnage} applaudit. L'univers est bien organis\u00e9 !" },
        { title: 'Les saisons en bonus', emoji: '\uD83C\uDF43', text: "En bonus, le Jour et la Nuit cr\u00e9ent les SAISONS ! La Terre est un peu pench\u00e9e, comme un ballon qui penche sur le c\u00f4t\u00e9. En \u00e9t\u00e9, notre c\u00f4t\u00e9 de la Terre penche vers le Soleil et le Jour brille plus longtemps. En hiver, c'est le contraire et la Nuit reste plus longtemps. Au printemps et en automne, ils se partagent \u00e0 parts \u00e9gales. \"Comme \u00e7a, personne ne s'ennuie !\" Les enfants d\u00e9couvrent la neige, les fleurs, le soleil et les feuilles." },
        { title: 'Le plus beau moment', emoji: '\uD83C\uDF1F', text: "Ce soir, {personnage} regarde le coucher de soleil depuis {lieu}. Le ciel explose de couleurs : orange, rose, violet, bleu. C'est le moment o\u00f9 le Jour dit bonsoir et la Nuit dit bonjour. {personnage} sait maintenant que le jour et la nuit ne sont pas ennemis. Ils sont partenaires. La Terre tourne et chacun a son tour. Et le plus beau moment, c'est quand ils se rencontrent. Bonne nuit, petit astronome !" }

      // Template 0 — L'armée secrète du corps (système immunitaire)
      [
        { title: "Le petit rhume", emoji: '\uD83E\uDD27', text: "Ce matin, {personnage} se réveille avec le nez bouché et la gorge qui gratte. Atchoum ! Maman pose la main sur le front. \"Tu es un peu chaud, mon chéri.\" {personnage} se sent tout mou, tout fatigué. \"Pourquoi je suis malade ?\" demande {personnage}. \"Parce que des microbes sont entrés dans ton corps\", explique Maman. \"Mais ne t'inquiète pas. Ton corps a une armée secrète pour se défendre.\"" },
        { title: "Les envahisseurs", emoji: '\uD83E\uDDA0', text: "Maman explique : \"Les microbes sont des êtres minuscules, tellement petits qu'on ne peut pas les voir à l'œil nu. Il en existe partout : sur les poignées de porte, sur les jouets, dans l'air quand quelqu'un tousse.\" {personnage} écarquille les yeux. \"Partout ?!\" \"Oui, mais la plupart sont inoffensifs. Certains sont même utiles ! Seuls quelques-uns rendent malade. Et quand ils entrent dans ton corps, l'armée secrète se met en marche.\"" },
        { title: "La première ligne de défense", emoji: '\uD83D\uDEE1\uFE0F', text: "\"D'abord, ton corps a des barrières\", dit Maman. \"La peau empêche les microbes d'entrer. C'est comme un mur de château fort ! Le nez a des petits poils qui filtrent l'air. La salive dans la bouche tue certains microbes. Et les larmes nettoient tes yeux.\" {personnage} touche sa peau. \"Alors ma peau me protège ?\" \"Exactement ! Mais parfois, les microbes réussissent quand même à passer. C'est là que l'armée entre en action.\"" },
        { title: "Les globules blancs", emoji: '\u2694\uFE0F', text: "\"Dans ton sang, il y a des millions de soldats minuscules : les globules blancs. Quand un microbe entre, les globules blancs le repèrent tout de suite. Ils l'entourent et le mangent ! Miam ! C'est comme Pac-Man qui mange les fantômes.\" {personnage} rigole. \"Mes soldats mangent les microbes ?\" \"Oui ! Et ils sont très forts. Mais quand il y a beaucoup de microbes, il faut du temps pour tous les attraper. C'est pour ça que tu es malade quelques jours.\"" },
        { title: "La fièvre, une alliée", emoji: '\uD83C\uDF21\uFE0F', text: "{personnage} a un peu de fièvre. \"Pourquoi j'ai chaud ?\" demande {personnage} à {lieu}. \"La fièvre, c'est ton corps qui monte la température exprès ! Les microbes n'aiment pas la chaleur. C'est comme si ton corps allumait le chauffage pour gêner les envahisseurs.\" {personnage} est surpris. \"Alors la fièvre, c'est une bonne chose ?\" \"C'est le signe que ton corps se bat. Mais si elle monte trop, on peut prendre un médicament pour t'aider.\"" },
        { title: "La bataille fait rage", emoji: '\uD83D\uDCA5', text: "Pendant que {personnage} se repose à {lieu}, une vraie bataille se déroule dans son corps. Les globules blancs courent partout. Certains encerclent les microbes. D'autres fabriquent des armes spéciales appelées anticorps. Les anticorps se collent sur les microbes pour les empêcher de bouger. C'est un travail d'équipe ! Le nez coule parce que le corps évacue les microbes morts. Le corps tousse pour expulser ceux qui sont dans la gorge. Tout a une raison !" },
        { title: "Le repos, la meilleure arme", emoji: '\uD83D\uDECC', text: "\"Le plus important quand on est malade, c'est de se reposer\", dit Maman. \"Quand tu dors, ton corps fabrique ENCORE PLUS de globules blancs. C'est comme envoyer des renforts sur le champ de bataille.\" {personnage} boit un grand verre d'eau. \"L'eau aussi est importante. Elle aide le sang à transporter les soldats plus vite dans tout le corps.\" {personnage} mange une soupe chaude. La vapeur débouche le nez. Le bouillon réchauffe le ventre. Le corps a tout ce qu'il faut pour gagner la bataille." },
        { title: "La mémoire du corps", emoji: '\uD83E\uDDE0', text: "Le lendemain, {personnage} se sent déjà mieux ! Le nez est moins bouché. La gorge gratte moins. \"Tes globules blancs sont en train de gagner !\", dit Maman. \"Et tu sais le plus incroyable ? Ton corps va se SOUVENIR de ce microbe. Si le même microbe revient un jour, les globules blancs le reconnaîtront et l'élimineront beaucoup plus vite. C'est pour ça qu'on attrape rarement deux fois la même maladie.\" {personnage} est impressionné. Le corps a une mémoire !" },
        { title: "Les vaccins, des entraînements", emoji: '\uD83D\uDC89', text: "{personnage} demande : \"Et les vaccins alors, c'est quoi ?\" Maman sourit. \"Un vaccin, c'est comme un entraînement pour tes globules blancs. On leur montre un microbe affaibli, qui ne peut pas rendre malade. Les globules blancs s'entraînent contre lui et fabriquent des anticorps. Comme ça, si le VRAI microbe arrive un jour, ton corps est déjà prêt !\" \"C'est comme réviser avant un contrôle ?\", dit {personnage}. \"Exactement pareil !\" Maman rigole." },

      [
        { title: "La chute", emoji: '\uD83E\uDD95', text: "{personnage} joue à {lieu} quand soudain, PAF ! Le pied glisse et {personnage} tombe par terre. Aïe ! Le poignet fait très mal. Il gonfle et devient tout rouge. {personnage} essaie de bouger les doigts mais ça fait trop mal. Les larmes coulent. \"Ne bouge pas, on va à l'hôpital\", dit Maman en arrivant. Elle met doucement le bras de {personnage} contre le ventre avec une écharpe. Ça s'appelle une écharpe d'immobilisation. Ça empêche le bras de bouger." },
        { title: "Les urgences", emoji: '\uD83C\uDFE5', text: "Aux urgences, il y a du monde. Un monsieur a mal au ventre. Une dame a un pansement sur le front. Un bébé pleure. {personnage} attend sur une chaise en serrant son bras contre le ventre. Une infirmière sourit : \"Je vais regarder ton poignet.\" Elle le touche très doucement. \"Hmm, il est gonflé. On va faire une radio pour voir ce qui se passe à l'intérieur de ton bras. N'aie pas peur, ça ne fait pas du tout mal !\"" },
        { title: "La machine magique", emoji: '\uD83D\uDCF7', text: "On emmène {personnage} dans une salle spéciale avec une grande machine. C'est l'appareil de radiographie. \"Cette machine envoie des rayons spéciaux qui traversent ta peau et tes muscles mais qui s'arrêtent sur les os\", explique le docteur. \"C'est comme une photo, mais de l'intérieur !\" {personnage} pose le poignet sur une plaque froide. Clic ! C'est fait en une seconde. Pas de piqûre, pas de douleur. {personnage} est soulagé." },
        { title: "La photo des os", emoji: '\uD83E\uDDB4', text: "Le docteur montre la radio sur un grand écran lumineux. C'est incroyable : on voit les os de la main et du poignet ! Ils sont tout blancs sur un fond noir. {personnage} compte : \"Un, deux, trois... j'ai plein d'os dans la main !\" \"27 os rien que dans une main !\", dit le docteur. Puis il montre un endroit : \"Tu vois cette petite ligne sur l'os ? C'est une fracture. Ton os a une petite fissure. Comme une branche qui se casse un peu mais pas complètement.\"" },
        { title: "Le plâtre", emoji: '\uD83E\uDE79', text: "\"Pour guérir, ton os a besoin de rester immobile\", explique le docteur. \"On va mettre un plâtre.\" D'abord, on enroule du coton doux autour du poignet. Puis des bandes trempées dans de l'eau qui deviennent dures en séchant. C'est le plâtre ! Au début c'est tiède et mouillé, puis ça durcit comme de la pierre. {personnage} choisit la couleur : bleu ! Le plâtre est léger mais très solide. Le bras ne peut plus bouger du tout." },
        { title: "Les questions de {personnage}", emoji: '\u2753', text: "{personnage} a plein de questions. \"Comment l'os se répare ?\" Le docteur explique : \"Ton corps fabrique de la colle spéciale pour les os. Elle s'appelle le cal osseux. Les cellules de l'os se multiplient tout doucement et rebouchent la fissure. C'est comme quand on recolle un vase cassé, mais en beaucoup mieux parce que l'os redevient aussi solide qu'avant.\" \"Combien de temps ?\" \"Environ quatre à six semaines pour un poignet. C'est long, mais ton corps travaille jour et nuit.\"" },
        { title: "La star de l'école", emoji: '\u2B50', text: "Le lendemain, {personnage} arrive à {lieu} avec son plâtre bleu. Tout le monde veut le voir et le toucher ! \"Waouh, c'est dur comme la pierre !\" dit Léa. \"Je peux dessiner dessus ?\" demande Hugo. Bientôt le plâtre est couvert de dessins, de coeurs et de petits mots des copains. {personnage} est un peu fière. Écrire de la main gauche, c'est difficile et rigolo à la fois. Les lettres sont toutes tordues. Tout le monde rigole." },
        { title: "Apprendre la patience", emoji: '\u23F3', text: "Les semaines passent. C'est parfois difficile. {personnage} ne peut pas faire de vélo, ni de toboggan, ni nager. Ça gratte sous le plâtre et on ne peut pas se gratter. Mais {personnage} découvre de nouvelles choses : dessiner de l'autre main, lire plus de livres, jouer à des jeux de société. \"Quand on ne peut pas faire une chose, on en découvre d'autres\", dit Papy. {personnage} apprend la patience. Jour après jour, l'os travaille en silence pour guérir." },
        { title: "On enlève le plâtre !", emoji: '\uD83C\uDF89', text: "Six semaines plus tard, retour à l'hôpital. Le docteur utilise une petite scie spéciale qui vibre mais ne coupe pas la peau. BZZZZZ ! Le plâtre s'ouvre en deux. {personnage} découvre son bras : il est tout blanc et tout maigre ! Les muscles ont un peu fondu. \"C'est normal\", dit le docteur. \"Avec un peu d'exercice, tout va revenir.\" Une nouvelle radio montre que l'os est parfaitement réparé ! La petite ligne a disparu. Le corps a fait un travail incroyable." },
        { title: "Plus fort qu'avant", emoji: '\uD83D\uDCAA', text: "Les jours suivants, {personnage} fait des petits exercices pour retrouver la force dans son poignet. Serrer une balle en mousse, tourner le poignet doucement, attraper des objets. Petit à petit, la force revient. Et un mois plus tard, {personnage} rejoue à {lieu} comme avant ! En mieux, même, parce que maintenant {personnage} sait que le corps est une machine extraordinaire qui se répare tout seul. Les os, les muscles, la peau, tout repousse et tout guérit. Bonne nuit, petit casse-cou guéri !" }

const UNIVERSE_ORDER = ['pirates', 'quotidien', 'magie', 'robots', 'espace', 'sante'];

/* ====================================================================
   STATE
   ==================================================================== */
let state = {
  universe: null,
  characterIdx: -1,
  locationIdx: -1,
  currentPage: 0,
  currentScreen: 'welcome'
};

/* ====================================================================
   NAVIGATION
   ==================================================================== */
function goTo(screenId) {
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.remove('active'); cur.classList.add('exit-left'); }
  const next = document.getElementById(screenId);
  next.classList.remove('exit-left');
  // Force reflow
  void next.offsetWidth;
  next.classList.add('active');
  state.currentScreen = screenId;

  if (screenId === 'universe') buildUniverseGrid();
  if (screenId === 'character') buildChoiceGrid('character');
  if (screenId === 'location') buildChoiceGrid('location');
  if (screenId === 'story-screen') buildStory();

  updateAllProgress();
}

function goBack(screenId) {
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.remove('active'); }
  const next = document.getElementById(screenId);
  next.classList.remove('exit-left');
  next.classList.add('active');
  state.currentScreen = screenId;
}

function restart() {
  stopPlayAll();
  state = { universe: null, characterIdx: -1, locationIdx: -1, currentPage: 0, currentScreen: 'welcome', recordings: [] };
  document.documentElement.style.setProperty('--universe-color', '#f39c12');
  goTo('welcome');
}

/* ====================================================================
   PROGRESS BAR
   ==================================================================== */
function updateAllProgress() {
  const steps = ['universe', 'character', 'location'];
  const screenToStep = { universe: 0, character: 1, location: 2 };
  const currentStep = screenToStep[state.currentScreen] ?? -1;

  steps.forEach(s => {
    const bar = document.getElementById('prog-' + s);
    if (!bar) return;
    const idx = screenToStep[s];
    bar.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      if (i < idx) dot.classList.add('done');
      else if (i === idx) dot.classList.add('current');
      bar.appendChild(dot);
    }
  });
}

/* ====================================================================
   UNIVERSE GRID
   ==================================================================== */
function buildUniverseGrid() {
  const grid = document.getElementById('universe-grid');
  grid.innerHTML = '';
  UNIVERSE_ORDER.forEach(key => {
    const u = DATA[key];
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.style.borderColor = 'transparent';
    card.innerHTML = `<span class="emoji">${u.emoji}</span><span class="label">${u.name}</span>`;
    card.onclick = () => {
      state.universe = key;
      document.documentElement.style.setProperty('--universe-color', u.color);
      goTo('character');
    };
    grid.appendChild(card);
  });
}

/* ====================================================================
   CHOICE GRIDS (character, location, object)
   ==================================================================== */
function buildChoiceGrid(type) {
  const grid = document.getElementById(type + '-grid');
  const u = DATA[state.universe];
  grid.innerHTML = '';

  let items, nextScreen, stateKey;
  if (type === 'character') { items = u.personnages; nextScreen = 'location'; stateKey = 'characterIdx'; }
  else { items = u.lieux; nextScreen = 'story-screen'; stateKey = 'locationIdx'; }

  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.innerHTML = `<span class="emoji">${item.emoji}</span><span class="label">${item.name}</span>`;
    card.onclick = () => {
      state[stateKey] = idx;
      grid.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      setTimeout(() => goTo(nextScreen), 300);
    };
    grid.appendChild(card);
  });
}

/* ====================================================================
   STORY BUILDER
   ==================================================================== */
function buildStory() {
  const u = DATA[state.universe];
  const personnage = u.personnages[state.characterIdx];
  const lieu = u.lieux[state.locationIdx];

  // Deterministic template selection
  const templateIdx = (state.characterIdx + state.locationIdx * 2) % u.stories.length;
  const template = u.stories[templateIdx];

  // Build contracted lieu forms for French grammar
  function buildLieuForms(name) {
    const lc = name.startsWith("L'") || name.startsWith("L\u2019") ? name : name.charAt(0).toLowerCase() + name.slice(1);
    const forms = { plain: lc };
    if (lc.startsWith('le ')) {
      const rest = lc.slice(3);
      forms.a = 'au ' + rest;    // à le → au
      forms.de = 'du ' + rest;   // de le → du
    } else if (lc.startsWith('les ')) {
      const rest = lc.slice(4);
      forms.a = 'aux ' + rest;
      forms.de = 'des ' + rest;
    } else {
      forms.a = 'à ' + lc;
      forms.de = 'de ' + lc;
    }
    return forms;
  }
  const lieuForms = buildLieuForms(lieu.name);

  // Replace placeholders
  const pages = template.map(p => ({
    title: p.title,
    emoji: p.emoji,
    text: p.text
      .replace(/\{personnage\}/g, personnage.name)
      .replace(/à \{lieu\}/g, lieuForms.a)
      .replace(/À \{lieu\}/g, lieuForms.a.charAt(0).toUpperCase() + lieuForms.a.slice(1))
      .replace(/de \{lieu\}/g, lieuForms.de)
      .replace(/De \{lieu\}/g, lieuForms.de.charAt(0).toUpperCase() + lieuForms.de.slice(1))
      .replace(/\{lieu\}/g, lieuForms.plain)
  }));

  // Title
  document.getElementById('story-title').textContent = u.emoji + ' ' + u.name;
  document.querySelector('.story-header').style.background = u.color;

  // Determine story title from template
  const storyTitle = template[0].title;

  // Pages
  const container = document.getElementById('story-pages');
  container.innerHTML = '';
  state.recordings = [];

  // Cover page
  const cover = document.createElement('div');
  cover.className = 'story-page story-cover';
  cover.innerHTML = `<div class="cover-emoji">${u.emoji}</div>
    <h1 class="cover-title">${storyTitle}</h1>
    <p class="cover-meta">${personnage.name} &middot; ${lieu.name}</p>
    <button class="btn-play-all" id="btn-play-all" onclick="playAllRecordings()" style="display:none;">&#9654; Écouter l'histoire</button>
    <p class="cover-hint" id="cover-hint">Enregistre chaque page pour débloquer la lecture</p>`;
  container.appendChild(cover);

  // Story pages
  pages.forEach((p, idx) => {
    state.recordings.push(null);
    const div = document.createElement('div');
    div.className = 'story-page';
    div.innerHTML = `<div class="page-text">${p.text}</div>
      <div class="rec-controls">
        <button class="btn-rec idle" data-page="${idx}" onclick="toggleRecording(${idx})"></button>
        <span class="rec-duration" id="rec-dur-${idx}">0:00</span>
        <button class="btn-play-rec" id="rec-play-${idx}" onclick="playRecording(${idx})">&#9654;</button>
        <button class="btn-delete-rec" id="rec-del-${idx}" onclick="deleteRecording(${idx})">&#10005;</button>
      </div>`;
    container.appendChild(div);
  });

  // Dots (cover + pages)
  const totalSlides = pages.length + 1;
  const dots = document.getElementById('page-dots');
  dots.innerHTML = '';
  for (let i = 0; i < totalSlides; i++) {
    const span = document.createElement('span');
    if (i === 0) span.classList.add('active');
    dots.appendChild(span);
  }

  state.currentPage = 0;
  updateStoryNav();
  container.style.transform = 'translateX(0)';

  // Touch swipe
  setupSwipe();
}

function storyNav(dir) {
  const container = document.getElementById('story-pages');
  const total = container.children.length;
  const next = state.currentPage + dir;
  if (next < 0 || next >= total) return;
  state.currentPage = next;
  container.style.transform = `translateX(-${next * 100}%)`;
  updateStoryNav();
}

function updateStoryNav() {
  const total = document.getElementById('story-pages').children.length;
  document.getElementById('prev-btn').disabled = state.currentPage === 0;
  document.getElementById('next-btn').disabled = state.currentPage === total - 1;
  const dots = document.getElementById('page-dots').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('active', i === state.currentPage);
  }
}

/* ====================================================================
   SWIPE SUPPORT
   ==================================================================== */
function setupSwipe() {
  const vp = document.getElementById('story-viewport');
  let startX = 0, startY = 0, moved = false;

  vp.ontouchstart = e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false; };
  vp.ontouchmove = e => { moved = true; };
  vp.ontouchend = e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      storyNav(dx < 0 ? 1 : -1);
    }
  };

  // Also allow click on left/right halves
  vp.onclick = e => {
    const rect = vp.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < rect.width * 0.3) storyNav(-1);
    else if (x > rect.width * 0.7) storyNav(1);
  };
}

/* ====================================================================
   RECORDING
   ==================================================================== */
let mediaRecorder = null;
let recordingChunks = [];
let recordingPageIdx = -1;
let recTimerInterval = null;
let recStartTime = 0;
let playingAll = false;
let playAllAudio = null;

function toggleRecording(pageIdx) {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    // Stop current recording
    mediaRecorder.stop();
    return;
  }
  // Start recording
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    recordingChunks = [];
    recordingPageIdx = pageIdx;
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) recordingChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recTimerInterval);
      const blob = new Blob(recordingChunks, { type: 'audio/webm' });
      state.recordings[recordingPageIdx] = blob;
      updateRecUI(recordingPageIdx);
      updatePlayAllButton();
      recordingPageIdx = -1;
      mediaRecorder = null;
    };

    mediaRecorder.start();
    recStartTime = Date.now();
    const durEl = document.getElementById('rec-dur-' + pageIdx);
    durEl.classList.add('visible');
    durEl.textContent = '0:00';
    recTimerInterval = setInterval(() => {
      const sec = Math.floor((Date.now() - recStartTime) / 1000);
      durEl.textContent = Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
    }, 500);

    // Update button state
    const btn = document.querySelector(`.btn-rec[data-page="${pageIdx}"]`);
    btn.className = 'btn-rec recording';
  }).catch(() => {
    alert('Impossible d\'accéder au microphone.');
  });
}

function updateRecUI(pageIdx) {
  const btn = document.querySelector(`.btn-rec[data-page="${pageIdx}"]`);
  const playBtn = document.getElementById('rec-play-' + pageIdx);
  const delBtn = document.getElementById('rec-del-' + pageIdx);
  const durEl = document.getElementById('rec-dur-' + pageIdx);

  if (state.recordings[pageIdx]) {
    btn.className = 'btn-rec has-audio';
    playBtn.classList.add('visible');
    delBtn.classList.add('visible');
    durEl.classList.remove('visible');
    // Update dot color
    const dots = document.getElementById('page-dots').children;
    if (dots[pageIdx]) dots[pageIdx].style.background = 'var(--universe-color)';
  } else {
    btn.className = 'btn-rec idle';
    playBtn.classList.remove('visible');
    delBtn.classList.remove('visible');
    durEl.classList.remove('visible');
    const dots = document.getElementById('page-dots').children;
    if (dots[pageIdx]) dots[pageIdx].style.background = '';
  }
}

// Shared audio element for mobile compatibility
let sharedAudio = null;
function getSharedAudio() {
  if (!sharedAudio) {
    sharedAudio = new Audio();
    sharedAudio.setAttribute('playsinline', '');
    sharedAudio.setAttribute('webkit-playsinline', '');
  }
  return sharedAudio;
}

function playRecording(pageIdx) {
  if (!state.recordings[pageIdx]) return;
  const audio = getSharedAudio();
  if (audio._currentUrl) URL.revokeObjectURL(audio._currentUrl);
  const url = URL.createObjectURL(state.recordings[pageIdx]);
  audio._currentUrl = url;
  audio.src = url;
  audio.onended = () => { URL.revokeObjectURL(url); audio._currentUrl = null; };
  const p = audio.play();
  if (p && p.catch) p.catch(() => {});
}

function deleteRecording(pageIdx) {
  state.recordings[pageIdx] = null;
  updateRecUI(pageIdx);
  updatePlayAllButton();
}

function updatePlayAllButton() {
  const btn = document.getElementById('btn-play-all');
  const hint = document.getElementById('cover-hint');
  const allRecorded = state.recordings && state.recordings.length > 0 && state.recordings.every(r => r !== null);
  btn.style.display = allRecorded ? '' : 'none';
  if (hint) hint.style.display = allRecorded ? 'none' : '';
}

function playAllRecordings() {
  if (!state.recordings || playingAll) {
    stopPlayAll();
    return;
  }

  playingAll = true;
  const btn = document.getElementById('btn-play-all');
  btn.classList.add('playing');
  btn.innerHTML = '&#9632; Stop';

  // Go to first story page (slide 1, after cover)
  playPageAudio(0);
}

function playPageAudio(pageIdx) {
  if (!playingAll || pageIdx >= state.recordings.length) {
    stopPlayAll();
    return;
  }

  // Navigate to slide (pageIdx + 1 because slide 0 = cover)
  const slideIdx = pageIdx + 1;
  state.currentPage = slideIdx;
  document.getElementById('story-pages').style.transform = `translateX(-${slideIdx * 100}%)`;
  updateStoryNav();

  const blob = state.recordings[pageIdx];
  if (!blob) { stopPlayAll(); return; }

  const audio = getSharedAudio();
  if (audio._currentUrl) URL.revokeObjectURL(audio._currentUrl);
  const url = URL.createObjectURL(blob);
  audio._currentUrl = url;
  audio.src = url;
  playAllAudio = audio;
  audio.onended = () => {
    URL.revokeObjectURL(url);
    audio._currentUrl = null;
    if (playingAll && pageIdx + 1 < state.recordings.length) {
      setTimeout(() => playPageAudio(pageIdx + 1), 800);
    } else {
      stopPlayAll();
    }
  };
  const p = audio.play();
  if (p && p.catch) p.catch(() => {});
}

function stopPlayAll() {
  playingAll = false;
  if (playAllAudio) {
    playAllAudio.pause();
    playAllAudio = null;
  }
  const btn = document.getElementById('btn-play-all');
  if (btn) {
    btn.classList.remove('playing');
    btn.innerHTML = '&#9654; Écouter l\'histoire';
  }
}

/* ====================================================================
   INIT
   ==================================================================== */
document.addEventListener('DOMContentLoaded', () => {
  // Ensure only welcome is active
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('welcome').classList.add('active');

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
});
</script>

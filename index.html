const UNIVERSE_ORDER = ['pirates', 'quotidien', 'magie', 'robots', 'espace', 'sante'];

/* ====================================================================
   STATE
   ==================================================================== */
let state = {
  universe: null,
  characterIdx: -1,
  locationIdx: -1,
  objectIdx: -1,
  currentPage: 0,
  currentScreen: 'welcome'
};

/* ====================================================================
   NAVIGATION
   ==================================================================== */
function goTo(screenId) {
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.remove('active'); cur.classList.add('exit-left'); }
  const next = document.getElementById(screenId);
  next.classList.remove('exit-left');
  // Force reflow
  void next.offsetWidth;
  next.classList.add('active');
  state.currentScreen = screenId;

  if (screenId === 'universe') buildUniverseGrid();
  if (screenId === 'character') buildChoiceGrid('character');
  if (screenId === 'location') buildChoiceGrid('location');
  if (screenId === 'object') buildChoiceGrid('object');
  if (screenId === 'story-screen') buildStory();

  updateAllProgress();
}

function goBack(screenId) {
  const cur = document.querySelector('.screen.active');
  if (cur) { cur.classList.remove('active'); }
  const next = document.getElementById(screenId);
  next.classList.remove('exit-left');
  next.classList.add('active');
  state.currentScreen = screenId;
}

function restart() {
  state = { universe: null, characterIdx: -1, locationIdx: -1, objectIdx: -1, currentPage: 0, currentScreen: 'welcome' };
  document.documentElement.style.setProperty('--universe-color', '#f39c12');
  goTo('welcome');
}

/* ====================================================================
   PROGRESS BAR
   ==================================================================== */
function updateAllProgress() {
  const steps = ['universe', 'character', 'location', 'object'];
  const screenToStep = { universe: 0, character: 1, location: 2, object: 3 };
  const currentStep = screenToStep[state.currentScreen] ?? -1;

  steps.forEach(s => {
    const bar = document.getElementById('prog-' + s);
    if (!bar) return;
    const idx = screenToStep[s];
    bar.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      if (i < idx) dot.classList.add('done');
      else if (i === idx) dot.classList.add('current');
      bar.appendChild(dot);
    }
  });
}

/* ====================================================================
   UNIVERSE GRID
   ==================================================================== */
function buildUniverseGrid() {
  const grid = document.getElementById('universe-grid');
  grid.innerHTML = '';
  UNIVERSE_ORDER.forEach(key => {
    const u = DATA[key];
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.style.borderColor = 'transparent';
    card.innerHTML = `<span class="emoji">${u.emoji}</span><span class="label">${u.name}</span>`;
    card.onclick = () => {
      state.universe = key;
      document.documentElement.style.setProperty('--universe-color', u.color);
      goTo('character');
    };
    grid.appendChild(card);
  });
}

/* ====================================================================
   CHOICE GRIDS (character, location, object)
   ==================================================================== */
function buildChoiceGrid(type) {
  const grid = document.getElementById(type + '-grid');
  const u = DATA[state.universe];
  grid.innerHTML = '';

  let items, nextScreen, stateKey;
  if (type === 'character') { items = u.personnages; nextScreen = 'location'; stateKey = 'characterIdx'; }
  else if (type === 'location') { items = u.lieux; nextScreen = 'object'; stateKey = 'locationIdx'; }
  else { items = u.objets; nextScreen = 'story-screen'; stateKey = 'objectIdx'; }

  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'choice-card';
    card.innerHTML = `<span class="emoji">${item.emoji}</span><span class="label">${item.name}</span>`;
    card.onclick = () => {
      state[stateKey] = idx;
      grid.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      setTimeout(() => goTo(nextScreen), 300);
    };
    grid.appendChild(card);
  });
}

/* ====================================================================
   ILLUSTRATION GENERATOR
   ==================================================================== */
function generateIllustration(emoji, universeId, universeColor, pageIndex) {
  // Seeded pseudo-random number generator
  function seededRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 9301 + 49297) % 233280;
      return s / 233280;
    };
  }

  // Create a seed from pageIndex and universeId
  let seedVal = pageIndex * 1000;
  for (let i = 0; i < universeId.length; i++) {
    seedVal += universeId.charCodeAt(i) * (i + 1);
  }
  const rng = seededRandom(seedVal);

  // Lighter shade of universe color for background
  function lightenColor(hex, amount) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    const lr = Math.min(255, r + (255 - r) * amount);
    const lg = Math.min(255, g + (255 - g) * amount);
    const lb = Math.min(255, b + (255 - b) * amount);
    return `rgb(${Math.round(lr)},${Math.round(lg)},${Math.round(lb)})`;
  }

  const bgColor = lightenColor(universeColor, 0.82);
  const accentLight = lightenColor(universeColor, 0.6);
  const accentMed = lightenColor(universeColor, 0.35);

  // Helper to get random position in margins (avoiding center where emoji is)
  function randX() { return 20 + rng() * 240; }
  function randY() { return 15 + rng() * 150; }
  function randSmall() { return 6 + rng() * 10; }
  function randOpacity() { return (0.25 + rng() * 0.45).toFixed(2); }

  // Decorative element generators per universe
  const DECORATIONS = {
    pirates: function() {
      const elems = [];
      // Waves at bottom
      const wy = 140 + rng() * 25;
      elems.push(`<path d="M0,${wy} Q35,${wy-12} 70,${wy} T140,${wy} T210,${wy} T280,${wy}" fill="none" stroke="${accentMed}" stroke-width="2.5" opacity="0.5"/>`);
      elems.push(`<path d="M0,${wy+10} Q35,${wy-2} 70,${wy+10} T140,${wy+10} T210,${wy+10} T280,${wy+10}" fill="none" stroke="${accentLight}" stroke-width="2" opacity="0.4"/>`);
      // Small fish
      for (let i = 0; i < 3; i++) {
        const fx = 20 + rng() * 240, fy = 130 + rng() * 40;
        const fs = 5 + rng() * 4;
        const dir = rng() > 0.5 ? 1 : -1;
        elems.push(`<g transform="translate(${fx},${fy}) scale(${dir},1)" opacity="${randOpacity()}"><ellipse cx="0" cy="0" rx="${fs}" ry="${fs*0.5}" fill="${accentMed}"/><polygon points="${-fs-3},0 ${-fs-7},-3 ${-fs-7},3" fill="${accentMed}"/><circle cx="${fs*0.4}" cy="${-fs*0.15}" r="1" fill="white"/></g>`);
      }
      // Clouds
      for (let i = 0; i < 2; i++) {
        const cx = 30 + rng() * 220, cy = 15 + rng() * 30;
        const cs = 10 + rng() * 8;
        elems.push(`<g opacity="0.3"><circle cx="${cx}" cy="${cy}" r="${cs}" fill="white"/><circle cx="${cx+cs*0.8}" cy="${cy}" r="${cs*0.7}" fill="white"/><circle cx="${cx-cs*0.6}" cy="${cy+1}" r="${cs*0.6}" fill="white"/></g>`);
      }
      // Anchor
      const ax = rng() > 0.5 ? 20 + rng()*30 : 230 + rng()*30;
      const ay = 30 + rng() * 40;
      elems.push(`<g transform="translate(${ax},${ay})" opacity="0.2"><line x1="0" y1="-8" x2="0" y2="8" stroke="${accentMed}" stroke-width="2"/><line x1="-6" y1="-8" x2="6" y2="-8" stroke="${accentMed}" stroke-width="2"/><path d="M-6,8 Q0,14 6,8" fill="none" stroke="${accentMed}" stroke-width="2"/></g>`);
      return elems;
    },
    quotidien: function() {
      const elems = [];
      // Sun or moon
      if (rng() > 0.4) {
        const sx = 30 + rng() * 40, sy = 20 + rng() * 15;
        elems.push(`<circle cx="${sx}" cy="${sy}" r="14" fill="#FFEAA7" opacity="0.6"/>`);
        for (let r = 0; r < 6; r++) {
          const angle = r * 60 * Math.PI / 180;
          const rx1 = sx + Math.cos(angle) * 18, ry1 = sy + Math.sin(angle) * 18;
          const rx2 = sx + Math.cos(angle) * 23, ry2 = sy + Math.sin(angle) * 23;
          elems.push(`<line x1="${rx1}" y1="${ry1}" x2="${rx2}" y2="${ry2}" stroke="#FFEAA7" stroke-width="2" opacity="0.5" stroke-linecap="round"/>`);
        }
      } else {
        elems.push(`<circle cx="240" cy="25" r="12" fill="#F8F1D8" opacity="0.5"/><circle cx="236" cy="21" r="10" fill="${bgColor}"/>`);
      }
      // Houses
      for (let i = 0; i < 2; i++) {
        const hx = (i === 0 ? 15 + rng()*40 : 220 + rng()*40), hy = 135 + rng() * 15;
        const hw = 16 + rng() * 8, hh = 14 + rng() * 6;
        const roofColor = rng() > 0.5 ? '#E8A87C' : '#D4A5A5';
        elems.push(`<g opacity="0.35"><rect x="${hx}" y="${hy}" width="${hw}" height="${hh}" fill="${accentLight}" rx="2"/><polygon points="${hx-3},${hy} ${hx+hw/2},${hy-hh*0.6} ${hx+hw+3},${hy}" fill="${roofColor}"/><rect x="${hx+hw*0.35}" y="${hy+hh*0.4}" width="${hw*0.3}" height="${hh*0.55}" fill="${accentMed}" rx="1"/></g>`);
      }
      // Trees
      for (let i = 0; i < 3; i++) {
        const tx = 60 + rng() * 160, ty = 130 + rng() * 20;
        const ts = 6 + rng() * 5;
        elems.push(`<g opacity="0.3"><rect x="${tx-1.5}" y="${ty}" width="3" height="${ts}" fill="#A68B6B" rx="1"/><circle cx="${tx}" cy="${ty-ts*0.3}" r="${ts*0.8}" fill="#A8D8A8"/></g>`);
      }
      // Flowers
      for (let i = 0; i < 4; i++) {
        const fx = 25 + rng() * 230, fy = 150 + rng() * 20;
        const fc = ['#FFB7B2','#FFDAC1','#B5EAD7','#C7CEEA'][Math.floor(rng()*4)];
        elems.push(`<g opacity="0.4"><circle cx="${fx}" cy="${fy}" r="3" fill="${fc}"/><circle cx="${fx}" cy="${fy}" r="1.5" fill="#FFEAA7"/><line x1="${fx}" y1="${fy+3}" x2="${fx}" y2="${fy+8}" stroke="#A8D8A8" stroke-width="1"/></g>`);
      }
      return elems;
    },
    magie: function() {
      const elems = [];
      // Stars (5-pointed)
      function star5(cx, cy, r, fill, op) {
        let pts = '';
        for (let i = 0; i < 5; i++) {
          const aOuter = (i * 72 - 90) * Math.PI / 180;
          const aInner = ((i * 72) + 36 - 90) * Math.PI / 180;
          pts += `${cx + Math.cos(aOuter)*r},${cy + Math.sin(aOuter)*r} `;
          pts += `${cx + Math.cos(aInner)*r*0.4},${cy + Math.sin(aInner)*r*0.4} `;
        }
        return `<polygon points="${pts.trim()}" fill="${fill}" opacity="${op}"/>`;
      }
      for (let i = 0; i < 5; i++) {
        const sx = 15 + rng() * 250, sy = 10 + rng() * 155;
        const sr = 4 + rng() * 7;
        const sc = ['#FFEAA7','#DDA0DD','#FFD700','#E8D5F5'][Math.floor(rng()*4)];
        elems.push(star5(sx, sy, sr, sc, (0.3 + rng()*0.35).toFixed(2)));
      }
      // Sparkle dots
      for (let i = 0; i < 8; i++) {
        const dx = 10 + rng() * 260, dy = 8 + rng() * 164;
        const dr = 1 + rng() * 2.5;
        elems.push(`<circle cx="${dx}" cy="${dy}" r="${dr}" fill="white" opacity="${(0.3+rng()*0.5).toFixed(2)}"/>`);
      }
      // Swirl paths
      for (let i = 0; i < 2; i++) {
        const sx = 30 + rng() * 220, sy = 30 + rng() * 120;
        const spread = 15 + rng() * 15;
        elems.push(`<path d="M${sx},${sy} Q${sx+spread},${sy-spread} ${sx+spread*2},${sy} T${sx+spread*3},${sy+spread*0.5}" fill="none" stroke="${accentLight}" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>`);
      }
      // Crescent moon
      const mx = 220 + rng() * 40, my = 15 + rng() * 25;
      elems.push(`<circle cx="${mx}" cy="${my}" r="10" fill="#FFEAA7" opacity="0.35"/><circle cx="${mx+4}" cy="${my-2}" r="9" fill="${bgColor}"/>`);
      return elems;
    },
    robots: function() {
      const elems = [];
      // Gears
      for (let i = 0; i < 3; i++) {
        const gx = 20 + rng() * 240, gy = 15 + rng() * 150;
        const gr = 7 + rng() * 8;
        const teeth = 6 + Math.floor(rng() * 3);
        let gearPath = '';
        for (let t = 0; t < teeth; t++) {
          const a1 = (t / teeth) * Math.PI * 2;
          const a2 = a1 + (0.3 / teeth) * Math.PI * 2;
          const a3 = a1 + (0.5 / teeth) * Math.PI * 2;
          const a4 = a1 + (0.8 / teeth) * Math.PI * 2;
          gearPath += `${t===0?'M':'L'}${gx+Math.cos(a1)*gr},${gy+Math.sin(a1)*gr} `;
          gearPath += `L${gx+Math.cos(a2)*(gr+4)},${gy+Math.sin(a2)*(gr+4)} `;
          gearPath += `L${gx+Math.cos(a3)*(gr+4)},${gy+Math.sin(a3)*(gr+4)} `;
          gearPath += `L${gx+Math.cos(a4)*gr},${gy+Math.sin(a4)*gr} `;
        }
        gearPath += 'Z';
        elems.push(`<path d="${gearPath}" fill="${accentMed}" opacity="${(0.2+rng()*0.2).toFixed(2)}"/><circle cx="${gx}" cy="${gy}" r="${gr*0.3}" fill="${bgColor}" opacity="0.5"/>`);
      }
      // Lightning bolts
      for (let i = 0; i < 2; i++) {
        const bx = 30 + rng() * 220, by = 20 + rng() * 100;
        elems.push(`<polygon points="${bx},${by} ${bx+5},${by+8} ${bx+2},${by+8} ${bx+6},${by+18} ${bx+1},${by+10} ${bx+4},${by+10}" fill="#FFEAA7" opacity="0.35"/>`);
      }
      // Circuit squares
      for (let i = 0; i < 5; i++) {
        const sx = 15 + rng() * 250, sy = 10 + rng() * 160;
        const ss = 3 + rng() * 4;
        elems.push(`<rect x="${sx}" y="${sy}" width="${ss}" height="${ss}" fill="${accentLight}" opacity="${(0.2+rng()*0.3).toFixed(2)}" rx="1"/>`);
      }
      // Circuit lines
      for (let i = 0; i < 3; i++) {
        const lx = 20 + rng() * 240, ly = 20 + rng() * 140;
        const ll = 20 + rng() * 30;
        const vert = rng() > 0.5;
        if (vert) {
          elems.push(`<line x1="${lx}" y1="${ly}" x2="${lx}" y2="${ly+ll}" stroke="${accentMed}" stroke-width="1" opacity="0.15"/>`);
        } else {
          elems.push(`<line x1="${lx}" y1="${ly}" x2="${lx+ll}" y2="${ly}" stroke="${accentMed}" stroke-width="1" opacity="0.15"/>`);
        }
      }
      return elems;
    },
    espace: function() {
      const elems = [];
      // Nebula gradient circles
      for (let i = 0; i < 2; i++) {
        const nx = 30 + rng() * 220, ny = 20 + rng() * 140;
        const nr = 25 + rng() * 20;
        const nc = ['#DDA0DD','#87CEEB','#DEB887'][Math.floor(rng()*3)];
        elems.push(`<circle cx="${nx}" cy="${ny}" r="${nr}" fill="${nc}" opacity="0.12"/>`);
      }
      // Planets with rings
      for (let i = 0; i < 2; i++) {
        const px = (i === 0 ? 20 + rng()*60 : 200 + rng()*60);
        const py = 25 + rng() * 120;
        const pr = 8 + rng() * 10;
        const pc = ['#E8A87C','#87CEEB','#DDA0DD','#A8D8A8'][Math.floor(rng()*4)];
        elems.push(`<circle cx="${px}" cy="${py}" r="${pr}" fill="${pc}" opacity="0.35"/>`);
        if (rng() > 0.4) {
          elems.push(`<ellipse cx="${px}" cy="${py}" rx="${pr*1.7}" ry="${pr*0.4}" fill="none" stroke="${pc}" stroke-width="1.5" opacity="0.25" transform="rotate(${-20+rng()*40},${px},${py})"/>`);
        }
      }
      // Small stars
      for (let i = 0; i < 12; i++) {
        const sx = 5 + rng() * 270, sy = 5 + rng() * 170;
        const sr = 0.8 + rng() * 2;
        elems.push(`<circle cx="${sx}" cy="${sy}" r="${sr}" fill="white" opacity="${(0.3+rng()*0.5).toFixed(2)}"/>`);
      }
      // Shooting star
      const ssx = 40 + rng() * 100, ssy = 15 + rng() * 30;
      elems.push(`<line x1="${ssx}" y1="${ssy}" x2="${ssx+35}" y2="${ssy+15}" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/><circle cx="${ssx}" cy="${ssy}" r="2" fill="white" opacity="0.5"/>`);
      return elems;
    },
    sante: function() {
      const elems = [];
      // Hearts
      for (let i = 0; i < 4; i++) {
        const hx = 15 + rng() * 250, hy = 15 + rng() * 150;
        const hs = 4 + rng() * 5;
        const hc = ['#FFB7B2','#FF6B6B','#FFA07A','#E8A87C'][Math.floor(rng()*4)];
        elems.push(`<path d="M${hx},${hy+hs*0.3} C${hx},${hy-hs*0.3} ${hx-hs},${hy-hs*0.3} ${hx-hs},${hy+hs*0.1} C${hx-hs},${hy+hs*0.5} ${hx},${hy+hs} ${hx},${hy+hs} C${hx},${hy+hs} ${hx+hs},${hy+hs*0.5} ${hx+hs},${hy+hs*0.1} C${hx+hs},${hy-hs*0.3} ${hx},${hy-hs*0.3} ${hx},${hy+hs*0.3}Z" fill="${hc}" opacity="${(0.25+rng()*0.3).toFixed(2)}"/>`);
      }
      // Plus signs
      for (let i = 0; i < 3; i++) {
        const px = 20 + rng() * 240, py = 15 + rng() * 150;
        const ps = 4 + rng() * 4;
        elems.push(`<g opacity="${(0.2+rng()*0.25).toFixed(2)}"><rect x="${px-ps}" y="${py-ps*0.3}" width="${ps*2}" height="${ps*0.6}" fill="${accentMed}" rx="1.5"/><rect x="${px-ps*0.3}" y="${py-ps}" width="${ps*0.6}" height="${ps*2}" fill="${accentMed}" rx="1.5"/></g>`);
      }
      // Leaves
      for (let i = 0; i < 3; i++) {
        const lx = 25 + rng() * 230, ly = 20 + rng() * 140;
        const ls = 5 + rng() * 5;
        elems.push(`<ellipse cx="${lx}" cy="${ly}" rx="${ls}" ry="${ls*0.4}" fill="#A8D8A8" opacity="${(0.25+rng()*0.3).toFixed(2)}" transform="rotate(${-30+rng()*60},${lx},${ly})"/>`);
      }
      // Small circles (pills)
      for (let i = 0; i < 4; i++) {
        const cx = 15 + rng() * 250, cy = 10 + rng() * 160;
        const cr = 2 + rng() * 3;
        const cc = ['#FFB7B2','#B5EAD7','#FFDAC1','#C7CEEA'][Math.floor(rng()*4)];
        elems.push(`<circle cx="${cx}" cy="${cy}" r="${cr}" fill="${cc}" opacity="${(0.3+rng()*0.3).toFixed(2)}"/>`);
      }
      return elems;
    }
  };

  // Build SVG
  const decorFn = DECORATIONS[universeId] || DECORATIONS.quotidien;
  const decorElems = decorFn();

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
    <rect width="280" height="180" rx="16" fill="${bgColor}"/>
    ${decorElems.join('\n    ')}
    <text x="140" y="100" text-anchor="middle" dominant-baseline="central" font-size="72">${emoji}</text>
  </svg>`;

  return svg;
}

/* ====================================================================
   STORY BUILDER
   ==================================================================== */
function buildStory() {
  const u = DATA[state.universe];
  const personnage = u.personnages[state.characterIdx];
  const lieu = u.lieux[state.locationIdx];
  const objet = u.objets[state.objectIdx];

  // Deterministic template selection
  const templateIdx = (state.characterIdx + state.locationIdx * 2 + state.objectIdx * 3) % u.stories.length;
  const template = u.stories[templateIdx];

  // Replace placeholders
  const pages = template.map(p => ({
    title: p.title,
    emoji: p.emoji,
    text: p.text
      .replace(/\{personnage\}/g, personnage.name)
      .replace(/\{personnage_emoji\}/g, personnage.emoji)
      .replace(/\{lieu\}/g, lieu.name)
      .replace(/\{lieu_emoji\}/g, lieu.emoji)
      .replace(/\{objet\}/g, objet.name)
      .replace(/\{objet_emoji\}/g, objet.emoji)
  }));

  // Title
  document.getElementById('story-title').textContent = u.emoji + ' ' + u.name;
  document.querySelector('.story-header').style.background = u.color;

  // Pages
  const container = document.getElementById('story-pages');
  container.innerHTML = '';
  pages.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = 'story-page';
    const illustrationSvg = generateIllustration(p.emoji, u.id, u.color, idx);
    div.innerHTML = `<div class="page-illustration">${illustrationSvg}</div><div class="page-title">${p.title}</div><div class="page-text">${p.text}</div>`;
    container.appendChild(div);
  });

  // Dots
  const dots = document.getElementById('page-dots');
  dots.innerHTML = '';
  for (let i = 0; i < pages.length; i++) {
    const span = document.createElement('span');
    if (i === 0) span.classList.add('active');
    dots.appendChild(span);
  }

  state.currentPage = 0;
  updateStoryNav();
  container.style.transform = 'translateX(0)';

  // Touch swipe
  setupSwipe();
}

function storyNav(dir) {
  const container = document.getElementById('story-pages');
  const total = container.children.length;
  const next = state.currentPage + dir;
  if (next < 0 || next >= total) return;
  state.currentPage = next;
  container.style.transform = `translateX(-${next * 100}%)`;
  updateStoryNav();
}

function updateStoryNav() {
  const total = document.getElementById('story-pages').children.length;
  document.getElementById('prev-btn').disabled = state.currentPage === 0;
  document.getElementById('next-btn').disabled = state.currentPage === total - 1;
  const dots = document.getElementById('page-dots').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('active', i === state.currentPage);
  }
}

/* ====================================================================
   SWIPE SUPPORT
   ==================================================================== */
function setupSwipe() {
  const vp = document.getElementById('story-viewport');
  let startX = 0, startY = 0, moved = false;

  vp.ontouchstart = e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false; };
  vp.ontouchmove = e => { moved = true; };
  vp.ontouchend = e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      storyNav(dx < 0 ? 1 : -1);
    }
  };

  // Also allow click on left/right halves
  vp.onclick = e => {
    const rect = vp.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x < rect.width * 0.3) storyNav(-1);
    else if (x > rect.width * 0.7) storyNav(1);
  };
}

/* ====================================================================
   INIT
   ==================================================================== */
document.addEventListener('DOMContentLoaded', () => {
  // Ensure only welcome is active
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('welcome').classList.add('active');

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
});
</script>
